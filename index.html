  <script type="text/babel">
    const KB_ARTICLES = [
      { id:"account-restricted", title:"Account Restricted", category:"Login / Password", tags:["restricted","login","myaccount","jason"], summary:"Accounts become restricted, usually after a break. myaccount.stevenson.edu shows 'Account Restricted Contact Admin' in red. Account will still appear in ADCheck but won't be flagged as restricted there — the error only shows on myaccount.", steps:["User tries to change password on myaccount.stevenson.edu and sees 'Account Restricted Contact Admin' in red","Make a ticket — Jason Dipnarine will unrestrict the account","Keep the Teams chat to just MFA resets or temp passwords, NOT account restrictions"], template:"Your account was unrestricted, and you can now follow the steps in [faq id=163] to change your password. If you have any further issues, let us know.", escalation:"Jason Dipnarine (via ticket)" },
      { id:"domain-unavailable", title:"Domain Isn't Available", category:"Login / Password", tags:["domain","login","ethernet","laptop","cached","credentials"], summary:"Device can't communicate with Domain Controller. Must be plugged into ethernet. Laptops cache credentials for 60 days.", steps:["Plug device directly into ethernet (not wireless)","Try logging in again","If laptop: cached credentials work for ~60 days from last domain auth","If expired: must come to campus and plug in to re-authenticate","For persistent issues after plugging in: check network cable, try different port"], template:null, escalation:"N&I team (if network issue)" },
      { id:"password-resets", title:"Password Resets", category:"Login / Password", tags:["password","reset","sync","myaccount"], summary:"User-driven process through myaccount.stevenson.edu. Fixes many sync issues across systems.", steps:["Direct user to myaccount.stevenson.edu","Click 'Forgot your Password'","Enter username, complete captcha","Receive verification code at external email","Set new password","Password syncs across AD, O365, Blackboard, and Self-Service"], template:null, escalation:null },
      { id:"suspicious-activity", title:"Suspicious Activity (O365)", category:"Login / Password", tags:["suspicious","risky","flagged","azure","mfa","jeremy"], summary:"Azure/AD/M365 flags unusual logins. User locked out of portal.office.com. Jeremy Haas (system admin) reviews sign-in logs in Entra admin center and clears risky flags.", steps:["Change ticket type to Technology/OIT → Systems","Copy in all user information","Note that the user has a risky sign-in","Jeremy Haas (system admin) reviews sign-in logs in Microsoft Entra admin center and clears the risky flag","After flag is removed: user must reset password AND re-enroll in MFA"], template:"We removed the risky flag on your account. You can go to https://myaccount.stevenson.edu/ and click the 'Forgot your password' button to reset your password and when you sign into https://portal.office.com it will make you enroll in MFA again. Reach back out if you have any issues.", escalation:"Technology/OIT → Systems (Jeremy Haas)" },
      { id:"external-email", title:"External Email Change", category:"Login / Password", tags:["external","email","change","verify"], summary:"User wants to change external email tied to SU account. Identity verification required.", steps:["Verify user identity (SU ID, date of birth, or security questions)","Change ticket type to Technology/OIT → Account → External Email Change","Include: username, current external email, new external email, and verification method used"], template:null, escalation:"Technology/OIT → Account → External Email Change" },
      { id:"username-lookup", title:"How Can a User Lookup Their Username?", category:"Login / Password", tags:["username","lookup","webxpress","find"], summary:"Direct users to webxpress.stevenson.edu to find their username.", steps:["Go to webxpress.stevenson.edu","Enter required personal information","Username will be displayed","This is the same username for all SU systems"], template:null, escalation:null },
      { id:"restricted-locked-disabled", title:"Restricted vs Locked vs Disabled", category:"Login / Password", tags:["restricted","locked","disabled","error","myaccount"], summary:"Three different account states with different fixes. Check error message on myaccount.stevenson.edu.", steps:["Go to myaccount.stevenson.edu → Forgot my password → enter username","Read the error message carefully — it tells you which state","LOCKED → User can unlock themselves (FAQ 7)","RESTRICTED → Only Jason Dipnarine can unrestrict. Put 'restricted account' in ticket subject","DISABLED → Most serious. Shows in ADCheck and myaccount. Put 'disabled account' in ticket subject"], template:null, escalation:"Jason Dipnarine (restricted) / Ticket with subject line (disabled)" },
      { id:"alumni", title:"Alumni", category:"Account Provisioning", tags:["alumni","graduated","access","6 months"], summary:"Auto process runs ~6 months after graduation. NO access after that. Staff alumni contact their previous dean.", steps:["Automatic process removes access ~6 months after graduation","No exceptions for students","Staff in Alumni container: have them reach out to previous dean if they need anything","Account is moved to People/After/Alumni container in AD"], template:null, escalation:null },
      { id:"parent-proxy", title:"Parent/Proxy Login", category:"Account Provisioning", tags:["parent","proxy","login","access"], summary:"Parent/proxy accounts — auto-assigns when ticket type is set correctly.", steps:["Set ticket type to Technology/OIT → Account → Parent/Proxy Access","System auto-assigns based on ticket type","Provide account setup instructions to the parent/proxy","They access Self-Service at selfservice.stevenson.edu"], template:null, escalation:"Technology/OIT → Account → Parent/Proxy Access" },
      { id:"account-setup", title:"Account Setup Instructions", category:"Account Provisioning", tags:["setup","new","account","instructions","manual"], summary:"Setup instructions auto-email to external address. If it fails, use Manual Account Setup Instructions template.", steps:["Account creation triggers automatic email to external address on file","If email failed or was never received: use Manual Account Setup Instructions template","Template includes: webxpress.stevenson.edu for username, myaccount.stevenson.edu for password reset, MFA enrollment at portal.office.com","Verify the external email on file is correct before resending"], template:null, escalation:null },
      { id:"mfa-instructions", title:"MFA Instructions", category:"Account Provisioning", tags:["mfa","authenticator","qr","enrollment","setup"], summary:"For first-time MFA enrollment or after reset. QR code at portal.office.com.", steps:["Go to portal.office.com and sign in","System prompts for MFA enrollment","Install Microsoft Authenticator app on phone","Scan QR code displayed on screen","Enter 6-digit verification code","MFA is now active for all SU cloud services"], template:null, escalation:null },
      { id:"name-change", title:"Name Change / Username Change", category:"Account Provisioning", tags:["name","change","username","registrar","directory"], summary:"Username changes need a reason. Name changes must go through registrar first.", steps:["NAME CHANGE: Student must submit Name Change request with the registrar first","Once confirmed: change ticket type to Technology/OIT → Directory Listing Correction","Admin Apps team updates Colleague → Systems team updates Active Directory","USERNAME CHANGE: Requires documented reason, change ticket type to Technology/OIT → Account → Username Change"], template:null, escalation:"Technology/OIT → Directory Listing Correction" },
      { id:"returning-students", title:"Returning Students", category:"Account Provisioning", tags:["returning","student","reactivate","aup","provision"], summary:"Usually still have an account. May need AUP re-agreement. Accounts auto-reprovision.", steps:["Returning students likely have existing account","AUP: Set account expiration from never to a close date in AD, send user to sucloud.stevenson.edu","Accounts auto-reprovision when student returns","If it doesn't work: confirm enrollment status with registrar","OIT cannot contact registrar by phone as of 3/18/2025 — tell student to contact them","If still not working: escalate ticket to helpdesk manager"], template:null, escalation:"Helpdesk Manager" },
      { id:"sso-instructions", title:"SSO Instructions Email", category:"Account Provisioning", tags:["sso","new student","activation","setup","accepted"], summary:"For students only. Full account activation walkthrough.", steps:["Get username at webxpress.stevenson.edu","Go to myaccount.stevenson.edu → Forgot your Password","Enter username → captcha → continue","Select external email → continue","Enter verification code","Install Microsoft Authenticator → scan QR code → enter 6-digit code","Set new SSO password","Agree to AUP at sucloud.stevenson.edu/LoginPolicy.jsp","Access portal at now.stevenson.edu"], template:"Welcome to Stevenson University!\n\nTo activate Your Single Sign-On, please use a computer or laptop.\n\n1. Get your username at https://webxpress.stevenson.edu\n2. Go to https://myaccount.stevenson.edu\n3. Select Forgot your Password\n4. Enter your username, then the captcha\n5. Select your external email and click continue\n6. Enter the verification code from your email\n7. Install Microsoft Authenticator app\n8. Scan QR code, enter 6-digit code\n9. Set your new password (this is your SSO password)\n10. Go to https://sucloud.stevenson.edu/LoginPolicy.jsp and agree to the Acceptable Use Policy\n11. Access your student portal at https://now.stevenson.edu\n\nIf you need assistance, contact the OIT Help Desk at 443-352-4400 or helpdesk@stevenson.edu", escalation:null },
      { id:"student-not-found", title:"Student Doesn't Exist in System", category:"Account Provisioning", tags:["not found","adcheck","new student","doesn't exist","applicant"], summary:"ADCheck returns nothing or shows Applicant status. Verify info, check start date, route accordingly.", steps:["Run ADCheck — if nothing returned, verify spelling and SU ID","If ADCheck shows Role: Applicant or Container: People/Accepted Students, the student hasn't been moved to Student status in Colleague yet","New students with start date 6+ months away: account won't exist yet, this is normal","Start date under 6 months: may need Admissions/Registrar to update Colleague status from Applicant to Student","Note: 'May be pre-2009 alumni or student' in ADCheck appears for many accounts and is NOT a reliable indicator","If truly not in system and should be: escalate to helpdesk manager"], template:null, escalation:"Helpdesk Manager" },
      { id:"suo-alumni", title:"SUO Alumni", category:"Account Provisioning", tags:["suo","online","alumni","m365"], summary:"SUO alumni in User Lifecycle After/Alumni container. No on-prem access. 6 months of M365 only.", steps:["SUO (Stevenson University Online) alumni are in the After/Alumni container","They get 6 months of M365 access after graduation","No on-premises access (can't log into campus computers)","After 6 months: all access removed","Same process as traditional alumni after that point"], template:null, escalation:null },
      { id:"adobe-access", title:"Adobe Account Access", category:"Adobe", tags:["adobe","creative cloud","access","license"], summary:"Everyone can get Adobe CC. Students need course enrollment proof. Faculty/staff need a reason.", steps:["All users eligible for Adobe Creative Cloud","Students: need course ID that requires Adobe (e.g., GDES, ART, PHOTO courses)","Faculty/Staff: need documented reason for request","Change ticket type to Technology/OIT → Adobe → Permissions Request","Include: username, role (student/faculty/staff), and justification"], template:null, escalation:"Technology/OIT → Adobe → Permissions Request" },
      { id:"adobe-personal", title:"Adobe Installation (Personal Device)", category:"Adobe", tags:["adobe","personal","install"], summary:"SU doesn't support personal devices. Point them to creativecloud.com.", steps:["SU does not support personal devices for liability reasons","Direct user to creativecloud.com to install themselves"], template:null, escalation:null },
      { id:"adobe-su-device", title:"Adobe Installation (SU Device)", category:"Adobe", tags:["adobe","install","su device","workstation"], summary:"Admins push Adobe remotely via Intune. Get workstation name, leave PC on/logged off.", steps:["Get the user's workstation name","Leave computer plugged in/powered on and LOGGED OFF","Laptops: must be plugged into ethernet AND power","Install pushed remotely via Intune — takes 30 minutes to 1 hour","Change ticket type to Technology/OIT → Adobe → Install Request"], template:null, escalation:"Technology/OIT → Adobe → Install Request" },
      { id:"bb-cant-login", title:"Blackboard — I Can't Login", category:"Blackboard", tags:["blackboard","login","bb","username"], summary:"Confirm using USERNAME not USERNAME@stevenson.edu. Try password change. Escalate to Jason Dipnarine.", steps:["Confirm user is logging in with USERNAME (not USERNAME@stevenson.edu)","Check when they last changed their password","If still failing: assign ticket to Jason Dipnarine to check if user is enabled in BB","Provide account information in ticket notes"], template:null, escalation:"Jason Dipnarine" },
      { id:"no-audio", title:"Classroom — No Audio", category:"Classroom Technology", tags:["audio","sound","classroom","projector","extron","epson"], summary:"Older rooms: check aux cable. Newer rooms: Extron volume, PC output set to Epson PJ.", steps:["OLDER CLASSROOMS: Confirm aux cable is plugged into the PC","NEWER CLASSROOMS:","Volume knob on Extron control panel is up and not muted","PC audio output is set to Epson PJ","Volume is up and enabled on the PC","If none works: power cycle the podium switch","Still broken: submit ticket to EdTech with room number"], template:null, escalation:"EdTech (with room number)" },
      { id:"projector-bluescreen", title:"Projector — Blue Screen", category:"Classroom Technology", tags:["projector","blue","screen","display","podium"], summary:"Full troubleshooting flow: verify details, basic checks, power cycle podium switch.", steps:["Get building, room number, and time of class","Check cables: HDMI/VGA connected?","Confirm correct input selected on projector","Power cycle the podium network switch (wait 30 seconds)","Try a different input source","If still blue: submit ticket to EdTech with full details"], template:null, escalation:"EdTech (with room details)" },
      { id:"directory-info", title:"Incorrect Directory Info", category:"Directory", tags:["directory","info","incorrect","admin apps"], summary:"Directory maintained by Admin Apps team. Get correct info + reason.", steps:["Get the specific information that needs to change","Get the correct replacement information","Change ticket type to Technology/OIT → Directory Listing Correction","Admin Apps team handles updates in Colleague","Changes propagate to the online directory after update"], template:null, escalation:"Technology/OIT → Directory Listing Correction" },
      { id:"encrypt-email", title:"How to Encrypt Emails (S/MIME)", category:"Email / Webmail", tags:["encrypt","email","smime","certificate"], summary:"Requires valid reason. Certificate from N&I team.", steps:["User must have a valid business reason for email encryption","Submit ticket with reason to N&I team","N&I issues S/MIME certificate","Certificate installed on user's Outlook client","Encrypts emails between users who both have certificates"], template:null, escalation:"N&I team" },
      { id:"no-license", title:"Microsoft Account — No License", category:"Email / Webmail", tags:["license","o365","microsoft","email","no access"], summary:"Everyone gets O365 by default. If auto-provisioning fails: Students get A5 for students, Faculty/Staff get A5 for faculty.", steps:["All users get a license by default","Students: Microsoft 365 A5 for students use benefit","Faculty/Staff: Microsoft 365 A5 for faculty","If license missing: assign ticket to helpdesk manager with user info"], template:null, escalation:"Helpdesk Manager" },
      { id:"shared-inbox", title:"Shared Inbox Access", category:"Email / Webmail", tags:["shared","inbox","mailbox","outlook"], summary:"Need access first via ticket to Systems. Classic Outlook: manual add. New Outlook: auto.", steps:["Change type to Technology/OIT → Email/Webmail Issue → Shared Inbox Access","CLASSIC OUTLOOK: File → Account Settings → Email → Change → More Settings → Advanced → Add","NEW OUTLOOK: Folder pane → Shared with me → expand → find shared mailbox"], template:null, escalation:"Technology/OIT → Email/Webmail Issue → Shared Inbox Access" },
      { id:"network-ticket-procedure", title:"Network Issue Procedure", category:"Networking", tags:["network","n&i","ticket","wifi","connectivity"], summary:"Info to gather BEFORE sending any ticket to N&I.", steps:["Building and room number (residential: include room letter)","When did the issue start?","Where does the issue occur?","Availabilities for in-person visit","Additional: Extension, Wired or wireless, Which services affected"], template:"Please provide the following:\n- Building and room number:\n- When did the issue start?:\n- Where does the issue occur?:\n- Availabilities in case we need to come out:\n- Are you connected wired or wireless?:\n- Which services are you having issues with?:", escalation:"N&I team" },
      { id:"ethernet-port", title:"Ethernet Port Not Working", category:"Networking", tags:["ethernet","port","patch","closet","cable"], summary:"Check ports, find network closet, verify patch panel to switch, patch if missing.", steps:["Note the numbers on the port","Find the network closet for that area","Look at the patch panel — find the matching port number","Verify it's patched (cable from patch panel to switch)","If not patched: run cable from switch to correct port","Test connectivity","If still not working: Technology/OIT → Network → Connectivity"], template:null, escalation:"Technology/OIT → Network → Connectivity (Wired or Wireless)" },
      { id:"rdp-access", title:"Grant RDP Access", category:"Networking", tags:["rdp","remote","desktop","access","ad"], summary:"Requires AD rights. Local machine + 3 AD changes. Confirm at personalrdp.stevenson.edu in ~30 min.", steps:["ON LOCAL MACHINE: Edit Local Users and Groups → Groups → Remote Desktop Users → add username","IN AD: User attributes → swareRDPHost → add PC name","IN AD: EDUSERS → Cloud Groups → Personal Desktop Users → add username","IN AD: EDUSERS → Cloud Groups → Personal Desktop Workstations → add PC name","User confirms at personalrdp.stevenson.edu in ~30 min"], template:null, escalation:null },
      { id:"personal-rdp", title:"Personal Remote Desktop", category:"Networking", tags:["rdp","remote","personal"], summary:"Machine must be on + ethernet. Go to personalrdp.stevenson.edu, download RDP profile.", steps:["Computer must be powered on and plugged into ethernet","Go to personalrdp.stevenson.edu","Log in with SU credentials","Download RDP profile for your machine","Open profile to connect remotely"], template:null, escalation:null },
      { id:"eduroam", title:"What is Eduroam?", category:"Networking", tags:["eduroam","wifi","wireless","network"], summary:"Federated wireless for universities. At SU: username@stevenson.edu + SSO password. Also required for WebPrint.", steps:["Eduroam = federated WiFi shared across universities","Connect to 'eduroam' SSID","Username: full email (username@stevenson.edu)","Password: SSO password","Works at any participating university","Also required for WebPrint (supapercut.stevenson.edu)"], template:null, escalation:null },
      { id:"new-equipment", title:"New Equipment Request", category:"Equipment", tags:["equipment","new","computer","purchase","budget"], summary:"Under 3 yrs: troubleshoot. Over 3 yrs: new equipment. Need budget code. Mike McGonigle.", steps:["Machine under 3 years: troubleshoot first","Machine over 3 years: proceed with request","Get: age, who is getting it, budget code (REQUIRED)","Change type to Technology/OIT → New Equipment Request","Mike McGonigle handles all orders"], template:null, escalation:"Technology/OIT → New Equipment Request (Mike McGonigle)" },
      { id:"new-hire", title:"New Hire Technology Request", category:"Equipment", tags:["new hire","onboarding","project"], summary:"Break into separate tickets. Main ticket = Project assigned to you.", steps:["Main ticket → PROJECT, assign to yourself","1. Computer/Software: Technology/OIT → New Hire Technology Request","2. Datatel/Informer: Technology/OIT → Colleague → New Account or Changes","3. Phone: Technology/OIT → Phone Issue → Phone Move/Number Reassignment","4. Network Drive: Technology/OIT → Network Drive Mappings → Add Drive","5. Etrieve: Technology/OIT → Etrieve → New Account","Link all to parent ticket. Don't resolve until all complete"], template:null, escalation:null },
      { id:"phone-break-work", title:"Phone — Break/Work Mode", category:"Phones", tags:["phone","break","work","mode"], summary:"Break: solid red, for personal time. Work: blinking red, code 0,0,7,# extends indefinitely.", steps:["BREAK: Press Break button (solid red). Press again to end.","WORK: Auto-activates 30 sec after login and calls.","Extend: Press Work → Tally → 0, 0, 7, # → solid red","Disable by pressing Work again"], template:null, escalation:null },
      { id:"phone-login", title:"Log Into Shared Phone", category:"Phones", tags:["phone","login","shared","acd"], summary:"ACD login for shared extensions. Contact Eric Lewis for login. Press Login → 3-digit code → #.", steps:["Press Login button on phone","Enter 3-digit agent code → #","Contact Eric Lewis (wlewis3@stevenson.edu) for login codes","For issues: Technology/OIT → Phone Issue"], template:null, escalation:"Eric Lewis (wlewis3@stevenson.edu)" },
      { id:"phone-outgoing", title:"Place Outgoing Calls", category:"Phones", tags:["phone","outgoing","call","external","internal"], summary:"Internal: 4-Digit Extension → extension. External: 8, 1, then number.", steps:["INTERNAL: Pick up → dial 4-digit extension","EXTERNAL: Pick up → 8 → 1 → full 10-digit number","Long distance follows same pattern: 8 → 1 → area code → number"], template:null, escalation:null },
      { id:"change-toner", title:"Change Toner", category:"Printers", tags:["toner","change","sharp","printer","mx-6071","mx-c303wh"], summary:"MX-6071S (large copier): open top. MX-C303WH (small copier): open main cover. Recycle old toner.", steps:["MX-6071S (Large copier): Open top cover → pull empty → replace same orientation → close","MX-C303WH (Small copier): Open main cover → swap → close","Printer resumes held jobs automatically","RECYCLE both box and cartridge in tech office recycling"], template:null, escalation:null },
      { id:"printer-id", title:"ID Not Recognized by Printer", category:"Printers", tags:["printer","id","card","proxid","papercut","windsx"], summary:"Card values in WinDSX sync to Papercut nightly. Mismatch: fix in WinDSX, not Papercut.", steps:["Ask user for numbers on back of ID card","Only Papercut admins can check values","If mismatch: DON'T fix in Papercut (nightly sync overwrites)","Security needs to update WinDSX","After update: wait for overnight sync"], template:null, escalation:"Security (WinDSX update)" },
      { id:"webprint", title:"WebPrint", category:"Printers", tags:["webprint","wireless","print","papercut","eduroam"], summary:"Print wirelessly via supapercut.stevenson.edu. Must be on Eduroam or Stevenson wireless.", steps:["Must be connected to Eduroam or Stevenson wireless network","Go to supapercut.stevenson.edu","Log in with SU credentials","Upload document and select printer","Pick up print job at selected printer using ID card"], template:null, escalation:null },
      { id:"adastra-email", title:"AdAstra / SU Scheduler Email Fix", category:"Email / Webmail", tags:["adastra","scheduler","email","notifications","smtp","exchange"], summary:"SU Scheduler (AdAstra) email notifications were broken due to Exchange 2013 decommission. SMTP relay updated from smtpex.stevenson.edu to smtp.stevenson.edu.", steps:["Root cause: AdAstra was configured to use smtpex.stevenson.edu (Exchange 2013 relay) which was decommissioned","Fix: Jason Dipnarine updated config to smtp.stevenson.edu port 25 on 4/1/2026","If users still report missing SU Scheduler notifications: verify they're checking correct email","If issue persists after fix: escalate to Jason Dipnarine","Related tickets: 260557, 260438, 260530, 260290, 260152"], template:"The SU Scheduler email notification issue has been resolved. The system was pointing to an old email relay that was decommissioned. The configuration has been updated and notifications should now be working. Please let us know if you're still not receiving notifications.", escalation:"Jason Dipnarine" },
      { id:"new-student-provisioning", title:"New Student Account Provisioning", category:"Account Provisioning", tags:["new student","provisioning","applicant","colleague","self-service","restricted"], summary:"New students must be moved from Applicant to Student status in Colleague (Ellucian) before their SU account is fully provisioned.", steps:["Student applies → account created in AD with Role: Applicant, Container: People/Accepted Students","At this stage: no SU email, no Self-Service access, myaccount.stevenson.edu may show 'Restricted'","Admissions/Registrar updates status in Colleague (Ellucian ERP) from Applicant → Student","Once updated: automated provisioning creates full account (email, Self-Service, portal access)","If student contacts helpdesk before provisioning: verify ADCheck shows Applicant status","Tell student to contact Admissions if their status hasn't been updated","Note: 'May be pre-2009 alumni or student' in ADCheck is unreliable — appears on many accounts","OIT cannot contact registrar by phone as of 3/18/2025"], template:"Your account is currently in the process of being set up. Your status needs to be updated by the Admissions office before your full SU account can be provisioned. Please contact Admissions to confirm your enrollment status has been finalized. Once that's done, your account will be automatically set up within 24-48 hours.", escalation:"Helpdesk Manager (if Admissions confirms student status is correct)" },
      { id:"vpn-access", title:"VPN / IPsec VPN", category:"Networking", tags:["vpn","ipsec","remote","certificate","om-vpn1"], summary:"VPN provides remote access to campus network resources. IPsec VPN managed by N&I. Certificate on OM-VPN1 requires periodic renewal.", steps:["VPN is for staff/faculty who need remote access to on-campus resources","User must have VPN access granted — submit ticket to N&I","VPN client configuration provided by N&I team","For connection issues: verify credentials, check VPN client version","IPsec VPN appliance: OM-VPN1","Certificate expiration must be monitored — check with N&I for renewal schedule"], template:null, escalation:"N&I team" },

    const {useState} = React;

    function CopyBtn({ text }) {
      const [c, setC] = useState(false);
      return <button style={{position:"absolute",top:8,right:8,background:c?"#5CC97A":"#1B6B3A",color:"#ffffff",border:"none",borderRadius:4,padding:"4px 12px",fontSize:11,fontFamily:"var(--font-mono)",fontWeight:600,cursor:"pointer"}} onClick={()=>{navigator.clipboard.writeText(text);setC(true);setTimeout(()=>setC(false),2000)}}>{c?"COPIED":"COPY"}</button>;
    }

    function ArticleView({ article, onBack }) {
      return <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:8,padding:24,maxWidth:900,margin:"0 auto"}}>
        <div onClick={onBack} style={{color:"var(--accent)",cursor:"pointer",marginBottom:8,fontSize:13}}>← Back</div>
        <h2 style={{margin:"0 0 8px",color:"var(--text)"}}>{article.title}</h2>
        <span style={{background:"var(--border)",color:"var(--accent)",padding:"2px 10px",borderRadius:4,fontSize:11,fontFamily:"var(--font-mono)"}}>{article.category}</span>
        <div style={{margin:"20px 0"}}>
          <div style={{fontFamily:"var(--font-mono)",fontSize:11,fontWeight:700,color:"var(--accent)",letterSpacing:1,marginBottom:6}}>SUMMARY</div>
          <div style={{color:"var(--text-dim)"}}>{article.summary}</div>
        </div>
        {article.steps && article.steps.length > 0 && <div style={{margin:"20px 0"}}>
          <div style={{fontFamily:"var(--font-mono)",fontSize:11,fontWeight:700,color:"var(--accent)",letterSpacing:1,marginBottom:6}}>STEPS</div>
          <div style={{background:"var(--bg)",borderRadius:6,padding:12}}>
            {article.steps.map((s,i)=><div key={i} style={{padding:"6px 0",color:"var(--text-dim)",borderBottom:i<article.steps.length-1?"1px solid var(--card)":"none"}}>{s}</div>)}
          </div>
        </div>}
        {article.template && <div style={{margin:"20px 0"}}>
          <div style={{fontFamily:"var(--font-mono)",fontSize:11,fontWeight:700,color:"var(--accent)",letterSpacing:1,marginBottom:6}}>RESPONSE TEMPLATE</div>
          <div style={{position:"relative",background:"var(--bg)",borderRadius:6,padding:16}}>
            <pre style={{margin:0,whiteSpace:"pre-wrap",fontFamily:"var(--font-mono)",fontSize:12,color:"var(--text-dim)",lineHeight:1.6}}>{article.template}</pre>
            <CopyBtn text={article.template}/>
          </div>
        </div>}
        {article.escalation && <div style={{margin:"20px 0"}}>
          <div style={{fontFamily:"var(--font-mono)",fontSize:11,fontWeight:700,color:"var(--accent)",letterSpacing:1,marginBottom:6}}>ESCALATION</div>
          <div style={{background:"var(--bg)",borderRadius:6,padding:12,color:"var(--text-dim)"}}>→ {article.escalation}</div>
        </div>}
      </div>;
    }

    function Flowchart({ flowKey, onBack, onArticle }) {
      const flow = FLOWCHARTS[flowKey];
      const [current, setCurrent] = useState(flow.start);
      const [history, setHistory] = useState([]);
      const node = flow.nodes[current];
      const goTo = (next) => { setHistory([...history, current]); setCurrent(next); };
      const goBack = () => { if(history.length) { setCurrent(history[history.length-1]); setHistory(history.slice(0,-1)); } else onBack(); };

      return <div>
        <div onClick={history.length ? goBack : onBack} style={{color:"var(--accent)",cursor:"pointer",marginBottom:8,fontSize:13}}>← Back</div>
        <h2 style={{margin:"0 0 16px",color:"var(--text)"}}>{flow.title}</h2>
        <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:8,padding:24}}>
          {node.r ? <>
            <div style={{fontFamily:"var(--font-mono)",fontSize:11,fontWeight:700,color:"var(--accent)",letterSpacing:1,marginBottom:6}}>RESOLUTION</div>
            <h3 style={{color:"var(--text)",margin:"0 0 12px"}}>{node.t}</h3>
            <div style={{color:"var(--text-dim)",lineHeight:1.6,marginBottom:16}}>{node.a}</div>
            {node.link && <button onClick={()=>onArticle(node.link)} style={{background:"var(--border)",color:"var(--accent)",border:"none",borderRadius:4,padding:"8px 16px",cursor:"pointer",fontFamily:"var(--font-mono)",fontSize:12}}>View KB article →</button>}
            <div style={{marginTop:16}}>
              <button onClick={()=>{setCurrent(flow.start);setHistory([])}} style={{background:"var(--accent)",color:"#fff",border:"none",borderRadius:4,padding:"8px 16px",cursor:"pointer",marginRight:8,fontSize:12}}>Start Over</button>
              <button onClick={goBack} style={{background:"var(--card)",color:"var(--text-dim)",border:"1px solid var(--border)",borderRadius:4,padding:"8px 16px",cursor:"pointer",fontSize:12}}>Go Back</button>
            </div>
          </> : <>
            <h3 style={{color:"var(--text)",margin:"0 0 16px"}}>{node.q}</h3>
            {node.opts.map((opt,i)=><div key={i} onClick={()=>goTo(opt.n)} style={{padding:"12px 16px",marginBottom:8,background:"var(--bg)",border:"1px solid var(--border)",borderRadius:6,color:"var(--text-dim)",cursor:"pointer"}} onMouseOver={e=>e.currentTarget.style.background="var(--hover)"} onMouseOut={e=>e.currentTarget.style.background="var(--bg)"}>{opt.l}</div>)}
          </>}
        </div>
      </div>;
    }

    function SubnetCalc() {
      const [ip, setIp] = useState("10.10.50.25");
      const [cidr, setCidr] = useState("24");
      const [calc, setCalc] = useState(null);
      const doCalc = () => {
        const parts = ip.split(".").map(Number);
        if(parts.length!==4||parts.some(p=>isNaN(p)||p<0||p>255)) return;
        const c = parseInt(cidr);
        if(isNaN(c)||c<0||c>32) return;
        const mask = c===0?0:(0xFFFFFFFF<<(32-c))>>>0;
        const ipn = ((parts[0]<<24)|(parts[1]<<16)|(parts[2]<<8)|parts[3])>>>0;
        const net = (ipn & mask)>>>0;
        const bcast = (net | (~mask>>>0))>>>0;
        const first = c>=31?net:(net+1)>>>0;
        const last = c>=31?bcast:(bcast-1)>>>0;
        const hosts = c>=32?1:c===31?2:Math.pow(2,32-c)-2;
        const toIp = n=>`${(n>>>24)&255}.${(n>>>16)&255}.${(n>>>8)&255}.${n&255}`;
        const toMask = n=>toIp(n);
        const wc = (~mask>>>0);
        const ipClass = parts[0]<128?"A"+(parts[0]===10||parts[0]===127?" (private)":""):parts[0]<192?"B"+(parts[0]===172&&parts[1]>=16&&parts[1]<=31?" (private)":""):parts[0]<224?"C"+(parts[0]===192&&parts[1]===168?" (private)":""):parts[0]<240?"D (multicast)":"E (reserved)";
        setCalc({net:toIp(net)+"/"+c,mask:toMask(mask),wc:toIp(wc),bcast:toIp(bcast),first:toIp(first),last:toIp(last),hosts,ipClass});
      };
      const fields = calc?[["NETWORK ADDRESS",calc.net,true],["SUBNET MASK",calc.mask],["WILDCARD MASK",calc.wc],["BROADCAST ADDRESS",calc.bcast,true],["FIRST USABLE HOST",calc.first,true],["LAST USABLE HOST",calc.last,true],["TOTAL USABLE HOSTS",calc.hosts.toLocaleString()],["IP CLASS",`Class ${calc.ipClass}`]]:[];
      return <div>
        <div style={{fontFamily:"var(--font-mono)",fontSize:11,fontWeight:700,color:"var(--text-dim)",letterSpacing:1,marginBottom:12}}>SUBNET CALCULATOR</div>
        <div style={{display:"flex",gap:12,alignItems:"flex-end",marginBottom:8}}>
          <div style={{flex:1}}><label style={{fontFamily:"var(--font-mono)",fontSize:11,color:"var(--text-dim)",display:"block",marginBottom:4}}>IP address</label><input value={ip} onChange={e=>setIp(e.target.value)} style={{width:"100%",padding:"10px 12px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:6,color:"var(--text)",fontSize:14,fontFamily:"var(--font-mono)",boxSizing:"border-box"}} /></div>
          <div style={{width:80}}><label style={{fontFamily:"var(--font-mono)",fontSize:11,color:"var(--text-dim)",display:"block",marginBottom:4}}>CIDR (0-32)</label><input value={cidr} onChange={e=>setCidr(e.target.value)} style={{width:"100%",padding:"10px 12px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:6,color:"var(--text)",fontSize:14,fontFamily:"var(--font-mono)",boxSizing:"border-box"}} /></div>
          <button onClick={doCalc} style={{padding:"10px 24px",background:"var(--accent)",color:"#fff",border:"none",borderRadius:6,cursor:"pointer",fontWeight:600,fontSize:14}}>Calculate</button>
        </div>
        <div style={{fontSize:12,color:"var(--text-dim)",marginBottom:20}}>Common CIDRs: /24 = 254 hosts (most common), /16 = 65,534 hosts, /8 = 16 million hosts</div>
        {calc && <>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            {fields.map(([label,val,green],i)=><div key={i} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:8,padding:16}}><div style={{fontFamily:"var(--font-mono)",fontSize:10,fontWeight:700,color:"var(--text-dim)",letterSpacing:1,marginBottom:4}}>{label}</div><div style={{fontSize:20,fontWeight:700,color:green?"var(--accent)":"var(--text)",fontFamily:"var(--font-mono)"}}>{val}</div></div>)}
          </div>
          <div style={{marginTop:16,background:"var(--card)",border:"1px solid var(--border)",borderRadius:8,padding:16}}>
            <div style={{fontFamily:"var(--font-mono)",fontSize:11,fontWeight:700,color:"var(--accent)",letterSpacing:1,marginBottom:8}}>WHAT THIS MEANS</div>
            <div style={{color:"var(--text-dim)",lineHeight:1.6}}>Any device with an IP between <code style={{color:"var(--accent)"}}>{calc.first}</code> and <code style={{color:"var(--accent)"}}>{calc.last}</code> is in the same subnet. They can talk directly. The broadcast address <code style={{color:"var(--accent)"}}>{calc.bcast}</code> reaches all {calc.hosts} devices at once.</div>
          </div>
        </>}
      </div>;
    }

    function Categorizer({ onArticle }) {
      const [text, setText] = useState("");
      const [result, setResult] = useState(null);
      const analyze = () => {
        if(!text.trim()) return;
        const q = text.toLowerCase();
        let best = null, bestScore = 0;
        CAT_RULES.forEach(rule => {
          let score = 0;
          rule.kw.forEach(k => { if(q.includes(k)) score += k.split(" ").length; });
          if(score > bestScore) { bestScore = score; best = rule; }
        });
        setResult(best ? {cat:best.cat, to:best.to, art:best.art, tip:best.tip} : null);
      };
      return <div>
        <div style={{fontFamily:"var(--font-mono)",fontSize:11,fontWeight:700,color:"var(--text-dim)",letterSpacing:1,marginBottom:12}}>PASTE TICKET TEXT OR DESCRIBE THE ISSUE</div>
        <textarea value={text} onChange={e=>setText(e.target.value)} placeholder={"Paste the ticket email or describe the issue here...\n\nExample: I can not log into my account, it says restricted"} style={{width:"100%",minHeight:100,padding:12,background:"var(--card)",border:"1px solid var(--border)",borderRadius:8,color:"var(--text)",fontSize:14,fontFamily:"inherit",resize:"vertical",boxSizing:"border-box"}} />
        <button onClick={analyze} style={{margin:"12px 0",padding:"10px 24px",background:"var(--accent)",color:"#fff",border:"none",borderRadius:6,cursor:"pointer",fontWeight:600,fontSize:14}}>Analyze Ticket</button>
        {result && <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:8,padding:24,marginTop:8}}>
          <div style={{fontFamily:"var(--font-mono)",fontSize:11,fontWeight:700,color:"var(--accent)",letterSpacing:1,marginBottom:6}}>BEST MATCH</div>
          <h3 style={{color:"var(--text)",margin:"0 0 12px"}}>{result.cat}</h3>
          <div style={{fontFamily:"var(--font-mono)",fontSize:11,color:"var(--text-dim)",marginBottom:12}}>ASSIGN TO:  {result.to}</div>
          {result.art && <button onClick={()=>onArticle(result.art)} style={{background:"var(--border)",color:"var(--accent)",border:"none",borderRadius:4,padding:"8px 16px",cursor:"pointer",fontFamily:"var(--font-mono)",fontSize:12,marginBottom:12}}>View KB article →</button>}
          {result.tip && <div style={{marginTop:8}}><div style={{fontFamily:"var(--font-mono)",fontSize:11,color:"var(--text-dim)",letterSpacing:1,marginBottom:4}}>TIP</div><div style={{background:"var(--bg)",borderRadius:6,padding:12,color:"var(--text-dim)",fontSize:13}}>{result.tip}</div></div>}
        </div>}
      </div>;
    }

    function BBRouting() {
      const [bbSearch, setBbSearch] = useState("");
      const q = bbSearch.toLowerCase();
      const bbResult = {};
      Object.entries(BB_ROUTING).forEach(([tech,prefixes])=>{
        const filtered = prefixes.filter(p=>!q||p.toLowerCase().includes(q));
        if(filtered.length||!q) bbResult[tech] = q ? filtered : prefixes;
      });
      return <>
        <input value={bbSearch} onChange={e=>setBbSearch(e.target.value)} placeholder="Enter course prefix (e.g. ACC, CHEM, PSY)..." style={{width:"100%",padding:"12px 16px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:8,color:"var(--text)",fontSize:14,marginBottom:20,boxSizing:"border-box"}} />
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16}}>
          {Object.entries(bbResult).map(([tech,prefixes])=><div key={tech} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:8,overflow:"hidden"}}>
            <div style={{padding:"12px 16px",borderBottom:"1px solid var(--border)"}}>
              <div style={{color:"var(--accent)",fontWeight:700}}>{tech}</div>
              <div style={{fontFamily:"var(--font-mono)",fontSize:11,color:"var(--text-dim)"}}>{BB_TECHS[tech].schools}</div>
            </div>
            {prefixes.map((p,i)=><div key={i} style={{padding:"8px 16px",borderBottom:"1px solid var(--bg)",color:"var(--text-dim)",fontSize:13,background:q&&p.toLowerCase().includes(q)?"var(--hover)":"transparent"}}>{p}</div>)}
          </div>)}
        </div>
      </>;
    }

    function PrinterLookup() {
      const [prSearch, setPrSearch] = useState("");
      const q = prSearch.toLowerCase();
      const filteredPrinters = PRINTERS.filter(p=>!q||p.id.toLowerCase().includes(q)||p.name.toLowerCase().includes(q)||p.location.toLowerCase().includes(q)||p.building.toLowerCase().includes(q));
      const grouped = {};
      filteredPrinters.forEach(p=>{if(!grouped[p.building])grouped[p.building]=[];grouped[p.building].push(p)});
      return <>
        <input value={prSearch} onChange={e=>setPrSearch(e.target.value)} placeholder="Search by ID, name, location, or building..." style={{width:"100%",padding:"12px 16px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:8,color:"var(--text)",fontSize:14,marginBottom:20,boxSizing:"border-box"}} />
        <div style={{display:"grid",gridTemplateColumns:"auto 1fr 1fr 1fr",gap:0}}>
          <div style={{fontFamily:"var(--font-mono)",fontSize:10,fontWeight:700,color:"var(--text-dim)",letterSpacing:1,padding:"8px 16px"}}>ID</div>
          <div style={{fontFamily:"var(--font-mono)",fontSize:10,fontWeight:700,color:"var(--text-dim)",letterSpacing:1,padding:"8px 16px"}}>NAME</div>
          <div style={{fontFamily:"var(--font-mono)",fontSize:10,fontWeight:700,color:"var(--text-dim)",letterSpacing:1,padding:"8px 16px"}}>LOCATION</div>
          <div style={{fontFamily:"var(--font-mono)",fontSize:10,fontWeight:700,color:"var(--text-dim)",letterSpacing:1,padding:"8px 16px"}}>MODEL</div>
          {Object.entries(grouped).map(([bldg,printers])=><React.Fragment key={bldg}>
            <div style={{gridColumn:"1/-1",fontFamily:"var(--font-mono)",fontSize:11,padding:"8px 16px",background:"var(--border)",color:"var(--accent)",fontWeight:600}}>{bldg}</div>
            {printers.map(p=><React.Fragment key={p.id}>
              <div style={{padding:"8px 16px",borderBottom:"1px solid var(--card)",color:"var(--text-dim)",fontSize:13}}>{p.id}</div>
              <div style={{padding:"8px 16px",borderBottom:"1px solid var(--card)",color:"var(--text)",fontSize:13,fontWeight:500}}>{p.name}</div>
              <div style={{padding:"8px 16px",borderBottom:"1px solid var(--card)",color:"var(--text-dim)",fontSize:13}}>{p.location}</div>
              <div style={{padding:"8px 16px",borderBottom:"1px solid var(--card)",color:"var(--text-dim)",fontSize:13}}>{p.model}</div>
            </React.Fragment>)}
          </React.Fragment>)}
        </div>
      </>;
    }

    function App() {
      const [tab, setTab] = useState("kb");
      const [article, setArticle] = useState(null);
      const [flow, setFlow] = useState(null);
      const [search, setSearch] = useState("");

      const goArticle = (id) => {
        const art = KB_ARTICLES.find(a=>a.id===id);
        if(art) { setArticle(art); setTab("kb"); }
      };

      const tabs = [
        {id:"kb",label:"Knowledge Base"},
        {id:"ts",label:"Troubleshoot"},
        {id:"bb",label:"BB Routing"},
        {id:"pr",label:"Printer Lookup"},
        {id:"cat",label:"Categorizer"},
        {id:"sub",label:"Subnet Calc"}
      ];

      return <div style={{minHeight:"100vh",background:"var(--bg)",color:"var(--text)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 24px",borderBottom:"1px solid var(--border)"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:32,height:32,background:"var(--accent)",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"var(--font-mono)",fontWeight:700,fontSize:14,color:"#fff"}}>SU</div>
            <span style={{fontWeight:700,fontSize:18}}>Helpdesk Companion</span>
          </div>
          <span style={{fontFamily:"var(--font-mono)",fontSize:12,color:"var(--text-dim)"}}>Stevenson OIT</span>
        </div>
        <div style={{display:"flex",gap:0,padding:"0 24px",borderBottom:"1px solid var(--border)"}}>
          {tabs.map(t=><button key={t.id} onClick={()=>{setTab(t.id);setArticle(null);setFlow(null);setSearch("")}} style={{padding:"12px 16px",background:"none",border:"none",borderBottom:tab===t.id?"2px solid var(--accent)":"2px solid transparent",color:tab===t.id?"var(--accent)":"var(--text-dim)",cursor:"pointer",fontSize:13,fontWeight:tab===t.id?600:400}}>{t.label}</button>)}
        </div>
        <div style={{padding:24,maxWidth:1300,margin:"0 auto"}}>
          {tab==="kb" && !article && <>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search articles..." style={{width:"100%",padding:"12px 16px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:8,color:"var(--text)",fontSize:14,marginBottom:24,boxSizing:"border-box"}} />
            {(()=>{
              const q = search.toLowerCase();
              const filtered = KB_ARTICLES.filter(a=>!q||a.title.toLowerCase().includes(q)||a.summary.toLowerCase().includes(q)||a.tags.some(t=>t.includes(q)));
              const grouped = {};
              filtered.forEach(a=>{if(!grouped[a.category])grouped[a.category]=[];grouped[a.category].push(a)});
              return Object.entries(grouped).map(([cat,arts])=><div key={cat}>
                <div style={{fontFamily:"var(--font-mono)",fontSize:11,fontWeight:700,color:"var(--text-dim)",letterSpacing:2,margin:"24px 0 12px"}}>{cat.toUpperCase()}</div>
                {arts.map(a=><div key={a.id} onClick={()=>setArticle(a)} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:8,padding:"16px 20px",marginBottom:8,cursor:"pointer"}} onMouseOver={e=>e.currentTarget.style.background="var(--hover)"} onMouseOut={e=>e.currentTarget.style.background="var(--card)"}>
                  <div style={{fontWeight:600,marginBottom:4}}>{a.title}</div>
                  <div style={{fontSize:13,color:"var(--text-dim)"}}>{a.summary}</div>
                </div>)}
              </div>);
            })()}
          </>}
          {tab==="kb" && article && <ArticleView article={article} onBack={()=>setArticle(null)} />}

          {tab==="ts" && !flow && <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            {Object.entries(FLOWCHARTS).map(([key,f])=><div key={key} onClick={()=>setFlow(key)} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:8,padding:"20px 24px",cursor:"pointer"}} onMouseOver={e=>e.currentTarget.style.background="var(--hover)"} onMouseOut={e=>e.currentTarget.style.background="var(--card)"}>
              <div style={{fontWeight:700,fontSize:16,marginBottom:4}}>{f.title}</div>
              <div style={{fontSize:13,color:"var(--text-dim)"}}>{f.desc}</div>
            </div>)}
          </div>}
          {tab==="ts" && flow && <Flowchart flowKey={flow} onBack={()=>setFlow(null)} onArticle={id=>{goArticle(id)}} />}

          {tab==="bb" && <BBRouting />}

          {tab==="pr" && <PrinterLookup />}

          {tab==="cat" && <Categorizer onArticle={goArticle} />}
          {tab==="sub" && <SubnetCalc />}
        </div>
      </div>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
