const KB_ARTICLES = [
  { id:"account-restricted", title:"Account Restricted", category:"Login / Password", tags:["restricted","login","myaccount","jason"], summary:"Accounts become restricted, usually after a break. myaccount.stevenson.edu shows 'Account Restricted Contact Admin' in red. Won't show in ADCheck.", steps:["User tries to change password on myaccount.stevenson.edu and sees 'Account Restricted Contact Admin' in red","Make a ticket — Jason will unrestrict the account","Keep the Teams chat to just MFA resets or temp passwords, NOT account restrictions"], template:"Your account was unrestricted, and you can now follow the steps in [faq id=163] to change your password. If you have any further issues, let us know.", escalation:"Jason (via ticket)" },
  { id:"domain-unavailable", title:"Domain Isn't Available", category:"Login / Password", tags:["domain","login","ethernet","laptop","cached","credentials"], summary:"Device can't communicate with Domain Controller. Must be plugged into ethernet. Laptops cache credentials for 60 days.", steps:["Confirm the device is plugged into ethernet","For laptops: first login requires ethernet, credentials cache for 60 days","After 60 days, plug back into ethernet to re-authenticate with the domain controller"], template:null, escalation:null },
  { id:"password-reset", title:"Password Resets", category:"Login / Password", tags:["password","reset","myaccount","forgot","sync"], summary:"User-driven process through myaccount.stevenson.edu. Fixes many sync issues across systems.", steps:["Go to https://myaccount.stevenson.edu/","Click 'Forgot your password' — enter username and captcha","Code sent to email of choice — proceed with password reset","User prompted to use Microsoft Authenticator (separate from O365 entry — ADSelfService rotating 6-digit code)","Verify the reset worked by asking them to sign into any Stevenson entity"], template:null, escalation:null },
  { id:"suspicious-activity", title:"Suspicious Activity (O365)", category:"Login / Password", tags:["suspicious","risky","flagged","compromised","azure","entra","mfa","jeremy"], summary:"Azure/AD/M365 flags unusual logins. User locked out of portal.office.com. System admin Jeremy Haas clears risky flags.", steps:["Change ticket type to Technology/OIT → Systems","Copy in all user information","Note that the user has a risky sign-in","Jeremy Haas (system admin) or a global admin clears the risky flag","After flag is removed: user must reset password AND MFA"], template:"We removed the risky flag on your account. You can go to https://myaccount.stevenson.edu/ and click the 'Forgot your password' button to reset your password and when you sign into https://portal.office.com it will make you enroll in MFA again. Reach back out if you have any issues.", escalation:"Technology/OIT → Systems (Jeremy Haas)" },
  { id:"external-email-change", title:"External Email Change", category:"Login / Password", tags:["external","email","change","identity","id","verification"], summary:"User wants to change external email tied to SU account. Identity verification required.", steps:["Get their new external email address","Get a copy/photo of their student ID to prove identity","If it doesn't match, speak to the helpdesk manager","Once verified, send ID copy and new external email to the helpdesk manager","Attach both to the ticket"], template:null, escalation:"Helpdesk Manager" },
  { id:"username-lookup", title:"How Can a User Lookup Their Username?", category:"Login / Password", tags:["username","lookup","find","webxpress"], summary:"Direct users to webxpress.stevenson.edu to find their username.", steps:["Go to https://webxpress.stevenson.edu/","Click 'What's My User ID?' (bottom right)","Enter last name + SSN or Student ID number","Click submit — next screen shows username"], template:null, escalation:null },
  { id:"restricted-vs-locked-vs-disabled", title:"Restricted vs Locked vs Disabled", category:"Login / Password", tags:["restricted","locked","disabled","error","myaccount"], summary:"Three different account states with different fixes. Check error message on myaccount.stevenson.edu.", steps:["Go to myaccount.stevenson.edu → Forgot my password → enter username","Read the error message carefully — it tells you which state","LOCKED → User can unlock themselves (FAQ 7)","RESTRICTED → Only Jason can unrestrict. Put 'restricted account' in ticket subject","DISABLED → Most serious. Shows in ADCheck and myaccount. Put 'disabled account' in ticket subject"], template:null, escalation:"Jason (restricted) / Ticket with subject line (disabled)" },
  { id:"alumni", title:"Alumni", category:"Account Provisioning", tags:["alumni","graduated","access","6 months"], summary:"Auto process runs ~6 months after graduation. NO access after that. Staff alumni contact their previous dean.", steps:["Automatic process removes access ~6 months after graduation","No exceptions for students","Staff in Alumni container: have them reach out to previous dean if they need teaching access","FAQ 159 has the full policy"], template:null, escalation:null, resources:"Tax Docs: 443-334-3500 / studentaccounts@stevenson.edu | Transcripts: 443-334-2206 / registrar@stevenson.edu | Handshake: stevenson.edu/career-connection/handshake/" },
  { id:"parent-proxy", title:"Parent/Proxy Login", category:"Account Provisioning", tags:["parent","proxy","login"], summary:"Parent/proxy accounts — auto-assigns when ticket type is set correctly.", steps:["Set ticket type: Technology: OIT → I Can't Login / Password Issue → I am a Parent / Proxy (auto-assigns)","Get the child's student ID → paste ADCheck in ticket","Get parent's email and phone number, CC them on ticket"], template:null, escalation:"Auto-assigned via ticket type" },
  { id:"account-setup-instructions", title:"Account Setup Instructions", category:"Account Provisioning", tags:["setup","provisioned","new","account","instructions","email"], summary:"Setup instructions auto-email to external address. If it fails, use Manual Account Setup Instructions bulk action.", steps:["Instructions auto-email to external address when account is provisioned","If it fails: run bulk action 'Manual Account Setup Instructions' (bottom left of ticket window)","Confirm and accept — instructions sent. No risk if account isn't active.","NEVER tell a user their external email address or username. Direct them to webxpress.stevenson.edu"], template:null, escalation:null },
  { id:"mfa-instructions", title:"MFA Instructions", category:"Account Provisioning", tags:["mfa","authenticator","qr","code","reset","enroll"], summary:"For first-time MFA enrollment or after reset. QR code at portal.office.com.", steps:["If MFA was reset: user must clear old Stevenson entry in Authenticator app first","Settings cog (top right) → select entry → Remove Account","Go to portal.office.com — QR code will appear","In Authenticator: Plus button → Work or school account → Scan QR Code","Enter the required number to confirm setup","Alternative: phone calls or SMS codes via 'I want to set up a different method'","For MFA resets: reach out to TEAM HELPDESK chat with the username"], template:"Hello,\n\nWe've reset your MFA - remove the existing entry in your app and then visit https://portal.office.com/ to re-enroll - press add in your app -> work or school -> scan the code, and you should be good!\n\nHowever, we now have more ways to authenticate besides the app. You can also select your phone and receive calls to authenticate or SMS codes. Select 'I want to set up a different method' when prompted.\n\nThank you,\n[Tech Name]", escalation:"TEAM HELPDESK chat (for MFA resets)" },
  { id:"name-change", title:"Name Change / Username Change", category:"Account Provisioning", tags:["name","username","change","registrar","directory"], summary:"Username changes need a reason. Name changes must go through registrar first.", steps:["USERNAME CHANGE: Get desired new username and a reason","NAME CHANGE: Confirm user submitted Name change request with the registrar first","Once confirmed: change ticket type to Technology/OIT → Directory Listing Correction","Admin Apps team updates Colleague → Systems team updates Active Directory"], template:null, escalation:"Technology/OIT → Directory Listing Correction" },
  { id:"returning-students", title:"Returning Students", category:"Account Provisioning", tags:["returning","student","reactivate","aup","provision"], summary:"Usually still have an account. May need AUP re-agreement. Accounts auto-reprovision.", steps:["Returning students likely have existing account","AUP: Set account expiration from never to a close date in AD, send user to sucloud.stevenson.edu","Accounts auto-reprovision when student returns","If it doesn't work: confirm enrollment status with registrar","OIT cannot contact registrar by phone as of 3/18/2025 — tell student to contact them","If still not working: escalate ticket to helpdesk manager"], template:null, escalation:"Helpdesk Manager" },
  { id:"sso-instructions", title:"SSO Instructions Email", category:"Account Provisioning", tags:["sso","new student","activation","setup","accepted"], summary:"For students only. Full account activation walkthrough.", steps:["Get username at webxpress.stevenson.edu","Go to myaccount.stevenson.edu → Forgot your Password","Enter username → captcha → continue","Select external email → continue","Enter verification code","Install Microsoft Authenticator → scan QR code → enter 6-digit code","Set new SSO password","Agree to AUP at sucloud.stevenson.edu/LoginPolicy.jsp","Access portal at now.stevenson.edu"], template:"Welcome to Stevenson University!\n\nTo activate Your Single Sign-On, please use a computer or laptop.\n\n1. Get your username at https://webxpress.stevenson.edu\n2. Go to https://myaccount.stevenson.edu\n3. Select Forgot your Password\n4. Enter your username, then the captcha\n5. Select your external email and click continue\n6. Enter the verification code from your email\n7. Install Microsoft Authenticator and scan the QR code\n8. Set your new SSO Password\n9. Agree to the AUP at https://sucloud.stevenson.edu/LoginPolicy.jsp\n10. Log in at https://now.stevenson.edu/\n\nTechnology Support Center\n443-334-3000 or toll-free 866-344-8190\nhelpdesk@stevenson.edu", escalation:null },
  { id:"student-doesnt-exist", title:"Student Doesn't Exist in System", category:"Account Provisioning", tags:["adcheck","not found","doesnt exist","new student","provision"], summary:"ADCheck returns nothing. Verify info, check start date, route accordingly.", steps:["Confirm you entered the right ID and checked AD Users and Computers","Check their start date:","MORE than 6 months away: Resolve ticket. Auto-provisioned.","LESS than 6 months away: Technology/OIT → Accounts Intake → Student Account Provisioning","Contact registrar with student info to confirm active status","ADMISSIONS ACCOUNT issues: not OIT — send to Admissions@stevenson.edu"], template:null, escalation:"Technology/OIT → Accounts Intake → Student Account Provisioning" },
  { id:"suo-alumni", title:"SUO Alumni", category:"Account Provisioning", tags:["suo","online","alumni"], summary:"SUO alumni in User Lifecycle After/Alumni container. No on-prem access. 6 months of M365 only.", steps:["SUO alumni are in User Lifecycle After/Alumni container","Container blocks on-prem resources (Self Service, Blackboard)","Only 6 months of M365 after graduation","Accounts should be active in Entra — confirm with helpdesk manager"], template:null, escalation:"Helpdesk Manager" },
  { id:"adobe-access", title:"Adobe Account Access", category:"Adobe", tags:["adobe","creative cloud","access"], summary:"Everyone can get Adobe CC. Students need course enrollment. Faculty/staff need a reason.", steps:["Students: must be enrolled in a graphic design course — get course ID","Faculty/Staff: must provide a reason. Confirm account info.","Change ticket type to Technology/OIT → Adobe → Permissions Request"], template:null, escalation:"Technology/OIT → Adobe → Permissions Request" },
  { id:"adobe-personal", title:"Adobe Installation (Personal Device)", category:"Adobe", tags:["adobe","personal","install"], summary:"SU doesn't support personal devices. Point them to creativecloud.com.", steps:["SU does not support personal devices for liability reasons","Direct user to creativecloud.com to install themselves"], template:null, escalation:null },
  { id:"adobe-su-device", title:"Adobe Installation (SU Device)", category:"Adobe", tags:["adobe","install","su device","workstation"], summary:"Admins push Adobe remotely. Get workstation name, leave PC on/logged off.", steps:["Get the user's workstation name","Leave computer plugged in/powered in and LOGGED OFF","Laptops: must be plugged into ethernet AND power","Install takes 30 minutes to 1 hour","Change ticket type to Technology/OIT → Adobe → Install Request"], template:null, escalation:"Technology/OIT → Adobe → Install Request" },
  { id:"bb-cant-login", title:"Blackboard — I Can't Login", category:"Blackboard", tags:["blackboard","login","bb","username"], summary:"Confirm using USERNAME not USERNAME@stevenson.edu. Try password change. Escalate to Jason.", steps:["Confirm user is logging in with USERNAME (not USERNAME@stevenson.edu)","Check when they last changed their password","If still failing: assign ticket to Jason to check if user is enabled in BB","Provide account information in ticket notes"], template:null, escalation:"Jason" },
  { id:"no-audio", title:"Classroom — No Audio", category:"Classroom Technology", tags:["audio","sound","classroom","projector","extron","epson"], summary:"Older rooms: check aux cable. Newer rooms: Extron volume, PC output set to Epson PJ.", steps:["OLDER CLASSROOMS: Confirm aux cable is plugged into the PC","NEWER CLASSROOMS:","Volume knob on Extron control panel is up and not muted","PC audio output is set to Epson PJ","Volume is up and enabled on the PC","If none works: power cycle everything"], template:null, escalation:null },
  { id:"projector-bluescreen", title:"Projector — Blue Screen", category:"Classroom Technology", tags:["projector","blue","screen","bluescreen","podium"], summary:"Full troubleshooting flow: verify details, basic checks, power cycle podium switch.", steps:["Get professor name, room number, issue description","Go to the room — verify issue persists","Basic checks: PC and projector ON? Correct input? Cables secure?","Power cycle podium: flip Sequence switch, wait 30 sec, flip back, wait 30 sec","If fixed: close ticket","If not: update ticket with detailed notes, escalate","MAC SPECIFIC: Hold BOTH on/off buttons ~30 sec until flashing stops"], template:null, escalation:"Escalate with detailed troubleshooting notes" },
  { id:"directory-info", title:"Incorrect Directory Info", category:"Directory", tags:["directory","incorrect","listing"], summary:"Directory maintained by Admin Apps team. Get correct info + reason.", steps:["Get the user's correct information","Get a reason for the change","Change ticket type to Technology/OIT → Directory Listing Correction"], template:null, escalation:"Technology/OIT → Directory Listing Correction" },
  { id:"encrypt-email", title:"How to Encrypt Emails (S/MIME)", category:"Email / Webmail", tags:["encrypt","smime","certificate","outlook"], summary:"Requires valid reason. Certificate from N&I team.", steps:["Ask user for a reason — no reason, no certificate","Obtain certificate from Network & Infrastructure team","Import certificate (double click, follow prompts)","Configure Outlook: File → Options → Trust Center → Trust Center Settings → Email Security","Choose certificate under Signing and Encryption Certificate","Apply and save"], template:null, escalation:"Network & Infrastructure team" },
  { id:"no-license", title:"Microsoft Account — No License", category:"Email / Webmail", tags:["license","microsoft","365","o365"], summary:"Everyone gets O365 by default. If auto fails: Students A5 for students, Faculty A5 for faculty.", steps:["All users get a license by default","Students: Microsoft 365 A5 for students use benefit","Faculty/Staff: Microsoft 365 A5 for faculty","Assign ticket to helpdesk manager with user info"], template:null, escalation:"Helpdesk Manager" },
  { id:"shared-inbox", title:"Shared Inbox Access", category:"Email / Webmail", tags:["shared","inbox","mailbox","outlook"], summary:"Need access first via ticket to Systems. Classic Outlook: manual add. New Outlook: auto.", steps:["Change type to Technology/OIT → Email/Webmail Issue → Shared Inbox Access","CLASSIC OUTLOOK: File → Account Settings → Email → Change → More Settings → Advanced → Add","NEW OUTLOOK: Folder pane → Shared with me → expand → find shared mailbox"], template:null, escalation:"Technology/OIT → Email/Webmail Issue → Shared Inbox Access" },
  { id:"network-ticket-procedure", title:"Network Issue Procedure", category:"Networking", tags:["network","n&i","ticket","wifi","connectivity"], summary:"Info to gather BEFORE sending any ticket to N&I.", steps:["Building and room number (residential: include room letter)","When did the issue start?","Where does the issue occur?","Availabilities for in-person visit","Additional: Extension, Wired or wireless, Which services affected"], template:"Please provide the following:\n- Building and room number:\n- When did the issue start?:\n- Where does the issue occur?:\n- Availabilities in case we need to come out:\n- Are you connected wired or wireless?:\n- Which services are you having issues with?:", escalation:"N&I team" },
  { id:"ethernet-port", title:"Ethernet Port Not Working", category:"Networking", tags:["ethernet","port","patch","closet","cable"], summary:"Check ports, find network closet, verify patch panel to switch, patch if missing.", steps:["Note the numbers on the port","Find the nearest network closet and the black patch panel","Is there a cable from that port to the silver switch? No cable = no link","If missing: NEATLY patch a cable from switch to correct port","Test connectivity","If still not working: Technology/OIT → Network → Connectivity"], template:null, escalation:"Technology/OIT → Network → Connectivity (Wired or Wireless)" },
  { id:"rdp-access", title:"Grant RDP Access", category:"Networking", tags:["rdp","remote","desktop","access","ad"], summary:"Requires AD rights. Local machine + 3 AD changes. Confirm at personalrdp.stevenson.edu in ~30 min.", steps:["ON LOCAL MACHINE: Edit Local Users and Groups → Groups → Remote Desktop Users → add username","IN AD: User attributes → swareRDPHost → add PC name","IN AD: EDUSERS → Cloud Groups → Personal Desktop Users → add username","IN AD: EDUSERS → Cloud Groups → Personal Desktop Workstations → add PC name","User confirms at personalrdp.stevenson.edu in ~30 min"], template:null, escalation:null },

  { id:"eduroam", title:"What is Eduroam?", category:"Networking", tags:["eduroam","wifi","wireless"], summary:"Federated wireless for universities. At SU: username@stevenson.edu + SSO password.", steps:["Eduroam lets users from participating institutions use WiFi at other campuses","At Stevenson: login with username@stevenson.edu and SSO password"], template:null, escalation:null },
  { id:"new-equipment", title:"New Equipment Request", category:"Equipment", tags:["equipment","new","computer","purchase","budget"], summary:"Under 3 yrs: troubleshoot. Over 3 yrs: new equipment. Need budget code. Mike McGonigle.", steps:["Machine under 3 years: troubleshoot first","Machine over 3 years: proceed with request","Get: age, who is getting it, budget code (REQUIRED)","Change type to Technology/OIT → New Equipment Request","Mike McGonigle handles all orders"], template:null, escalation:"Technology/OIT → New Equipment Request (Mike McGonigle)" },
  { id:"new-hire", title:"New Hire Technology Request", category:"Equipment", tags:["new hire","onboarding","project"], summary:"Break into separate tickets. Main ticket = Project assigned to you.", steps:["Main ticket → PROJECT, assign to yourself","1. Computer/Software: Technology/OIT → New Hire Technology Request","2. Datatel/Informer: Technology/OIT → Colleague → New Account or Changes","3. Phone: Technology/OIT → Phone Issue → Phone Move/Number Reassignment","4. Network Drive: Technology/OIT → Network Drive Mappings → Add Drive","5. Etrieve: Technology/OIT → Etrieve → New Account","Link all to parent ticket. Don't resolve until all complete"], template:null, escalation:null },

  { id:"phone-outgoing", title:"Place Outgoing Calls", category:"Phones", tags:["phone","call","outgoing"], summary:"Internal: 4-Digit Extension → extension. External: 8, 1, then number.", steps:["INTERNAL: Pick up → 4-Digit Extension button → enter extension","EXTERNAL: Pick up → 4-Digit Extension → 8, 1, then phone number","NEWER PHONES: Pick up → TechCon* button → 8, 1, then number"], template:null, escalation:null },

function CopyBtn({ text }) {
  const [c, setC] = useState(false);
  return <button style={{position:"absolute",top:8,right:8,background:c?"#5CC97A":"#1B6B3A",color:"#ffffff",border:"none",borderRadius:4,padding:"4px 12px",fontSize:11,fontFamily:"var(--font-mono)",fontWeight:600,cursor:"pointer"}} onClick={() => { navigator.clipboard.writeText(text); setC(true); setTimeout(() => setC(false), 2000); }}>{c ? "COPIED" : "COPY"}</button>;
}

function SubnetCalc() {
  const [ip, setIp] = useState("10.10.50.25");
  const [cidr, setCidr] = useState("24");
  const [result, setResult] = useState(null);

  const calc = () => {
    const parts = ip.split(".").map(Number);
    const c = parseInt(cidr);
    if (parts.length !== 4 || parts.some(p => isNaN(p) || p < 0 || p > 255) || isNaN(c) || c < 0 || c > 32) {
      setResult({ error: "Invalid IP or CIDR" }); return;
    }
    const mask = c === 0 ? 0 : (0xFFFFFFFF << (32 - c)) >>> 0;
    const ipn = ((parts[0] << 24) | (parts[1] << 16) | (parts[2] << 8) | parts[3]) >>> 0;
    const net = (ipn & mask) >>> 0;
    const bcast = (net | (~mask >>> 0)) >>> 0;
    const first = c >= 31 ? net : (net + 1) >>> 0;
    const last = c >= 31 ? bcast : (bcast - 1) >>> 0;
    const hosts = c >= 31 ? Math.pow(2, 32 - c) : Math.pow(2, 32 - c) - 2;
    const toIp = n => [(n >>> 24) & 255, (n >>> 16) & 255, (n >>> 8) & 255, n & 255].join(".");
    const toMask = m => [(m >>> 24) & 255, (m >>> 16) & 255, (m >>> 8) & 255, m & 255].join(".");
    const wc = (~mask) >>> 0;
    setResult({
      network: toIp(net) + "/" + c, subnetMask: toMask(mask), wildcard: toMask(wc),
      broadcast: toIp(bcast), firstHost: toIp(first), lastHost: toIp(last),
      totalHosts: Math.max(0, hosts),
      ipClass: parts[0] < 128 ? "A" : parts[0] < 192 ? "B" : parts[0] < 224 ? "C" : "D/E",
      isPrivate: (parts[0] === 10) || (parts[0] === 172 && parts[1] >= 16 && parts[1] <= 31) || (parts[0] === 192 && parts[1] === 168),
    });
  };

  const fields = result && !result.error ? [
    ["Network address", result.network, "var(--accent)", "rgba(27,107,58,0.2)"],
    ["Subnet mask", result.subnetMask, "var(--text-primary)", "var(--bg-secondary)"],
    ["Wildcard mask", result.wildcard, "var(--text-secondary)", "var(--bg-secondary)"],
    ["Broadcast address", result.broadcast, "#E5A832", "rgba(229,168,50,0.15)"],
    ["First usable host", result.firstHost, "#5CC97A", "rgba(92,201,122,0.15)"],
    ["Last usable host", result.lastHost, "#5CC97A", "rgba(92,201,122,0.15)"],
    ["Total usable hosts", result.totalHosts.toLocaleString(), "#A8B8C0", "rgba(168,184,192,0.15)"],
    ["IP class", "Class " + result.ipClass + (result.isPrivate ? " (private)" : " (public)"), "var(--text-secondary)", "var(--bg-secondary)"],
  ] : null;

  return <>
    <div style={{fontFamily:"var(--font-mono)",fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:1.5,color:"var(--text-muted)",marginBottom:12}}>Subnet calculator</div>
    <div style={{display:"flex",gap:12,marginBottom:16,alignItems:"flex-end",flexWrap:"wrap"}}>
      <div style={{flex:1,minWidth:200}}>
        <label style={{fontSize:12,fontFamily:"var(--font-mono)",color:"var(--text-muted)",display:"block",marginBottom:4}}>IP address</label>
        <input value={ip} onChange={e => setIp(e.target.value)} style={{width:"100%",background:"var(--bg-tertiary)",border:"1px solid var(--border)",borderRadius:6,padding:"12px 16px",fontSize:15,color:"var(--text-primary)",fontFamily:"inherit",outline:"none"}} />
      </div>
      <div style={{width:100}}>
        <label style={{fontSize:12,fontFamily:"var(--font-mono)",color:"var(--text-muted)",display:"block",marginBottom:4}}>CIDR (0-32)</label>
        <input value={cidr} onChange={e => setCidr(e.target.value)} style={{width:"100%",background:"var(--bg-tertiary)",border:"1px solid var(--border)",borderRadius:6,padding:"12px 16px",fontSize:15,color:"var(--text-primary)",fontFamily:"inherit",outline:"none"}} />
      </div>
      <button onClick={calc} style={{background:"#1B6B3A",color:"#ffffff",border:"none",borderRadius:6,padding:"12px 24px",fontSize:14,fontWeight:600,cursor:"pointer"}}>Calculate</button>
    </div>
    <div style={{fontSize:13,color:"var(--text-muted)",marginBottom:16}}>Common CIDRs: /24 = 254 hosts (most common), /16 = 65,534 hosts, /8 = 16 million hosts</div>
    {result && result.error && <div style={{background:"var(--bg-secondary)",border:"1px solid var(--border)",borderRadius:6,padding:16,textAlign:"center",color:"#E85555"}}>{result.error}</div>}
    {fields && <>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {fields.map((f, i) => <div key={i} style={{background:f[3],border:"1px solid var(--border)",borderRadius:6,padding:"12px 16px"}}>
          <div style={{fontSize:11,fontFamily:"var(--font-mono)",color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>{f[0]}</div>
          <div style={{fontSize:18,fontWeight:600,color:f[2],fontFamily:"var(--font-mono)"}}>{f[1]}</div>
        </div>)}
      </div>
      <div style={{background:"var(--bg-secondary)",border:"1px solid var(--border)",borderRadius:8,padding:16,marginTop:16}}>
        <div style={{fontSize:11,fontFamily:"var(--font-mono)",color:"var(--accent)",textTransform:"uppercase",letterSpacing:1.5,marginBottom:8}}>What this means</div>
        <p style={{fontSize:14,color:"var(--text-secondary)",lineHeight:1.6}}>
          Any device with an IP between <span style={{color:"#5CC97A",fontFamily:"var(--font-mono)"}}>{result.firstHost}</span> and <span style={{color:"#5CC97A",fontFamily:"var(--font-mono)"}}>{result.lastHost}</span> is in the same subnet. They can talk directly. The broadcast address <span style={{color:"#E5A832",fontFamily:"var(--font-mono)"}}>{result.broadcast}</span> reaches all {result.totalHosts.toLocaleString()} devices at once.
        </p>
      </div>
    </>}
  </>;
}

function Categorizer({ onArticle }) {
  const [text, setText] = useState("");
  const [results, setResults] = useState(null);

  const analyze = () => {
    if (!text.trim()) { setResults(null); return; }
    const q = text.toLowerCase();
    let matches = [];
    CAT_RULES.forEach(rule => {
      let score = 0;
      rule.kw.forEach(kw => { if (q.includes(kw)) score++; });
      if (score > 0) matches.push({ rule, score });
    });
    matches.sort((a, b) => b.score - a.score);
    setResults(matches.slice(0, 3));
  };

  return <>
    <div style={{fontFamily:"var(--font-mono)",fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:1.5,color:"var(--text-muted)",marginBottom:12}}>Paste ticket text or describe the issue</div>
    <textarea value={text} onChange={e => setText(e.target.value)} placeholder={"Paste the ticket email or describe the issue here...\n\nExample: I can not log into my account, it says restricted"} style={{width:"100%",minHeight:120,background:"var(--bg-tertiary)",border:"1px solid var(--border)",borderRadius:6,padding:14,fontSize:14,color:"var(--text-primary)",fontFamily:"inherit",resize:"vertical",outline:"none",marginBottom:12}} />
    <button onClick={analyze} style={{background:"#1B6B3A",color:"#ffffff",border:"none",borderRadius:6,padding:"10px 24px",fontSize:14,fontWeight:600,cursor:"pointer",marginBottom:20}}>Analyze Ticket</button>
    {results && results.length === 0 && <div style={{background:"var(--bg-secondary)",border:"1px solid var(--border)",borderRadius:6,padding:16,textAlign:"center",color:"#E5A832"}}>No match found. Try including more details.</div>}
    {results && results.length > 0 && results.map((m, i) => <div key={i} style={{background:"var(--bg-secondary)",border:"1px solid " + (i === 0 ? "var(--accent)" : "var(--border)"),borderRadius:8,padding:20,marginBottom:10}}>
      {i === 0 && <div style={{fontSize:11,fontFamily:"var(--font-mono)",color:"#5CC97A",marginBottom:8,textTransform:"uppercase",letterSpacing:1.5}}>Best match</div>}
      <div style={{fontSize:16,fontWeight:600,marginBottom:8}}>{m.rule.cat}</div>
      <div style={{marginBottom:8}}>
        <span style={{fontSize:11,fontFamily:"var(--font-mono)",color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:1}}>Assign to: </span>
        <span style={{fontSize:14,color:"#A8B8C0"}}>{m.rule.to}</span>
      </div>
      {m.rule.art && <button onClick={() => onArticle(m.rule.art)} style={{background:"none",border:"1px solid rgba(61,166,106,0.5)",color:"#3DA66A",padding:"4px 12px",borderRadius:4,cursor:"pointer",fontSize:12,fontFamily:"var(--font-mono)",marginBottom:8}}>View KB article →</button>}
      {m.rule.tip && <div style={{marginTop:8}}>
        <div style={{fontSize:11,fontFamily:"var(--font-mono)",color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Tip</div>
        <div style={{fontSize:13,color:"var(--text-secondary)",background:"var(--bg-tertiary)",padding:10,borderRadius:4}}>{m.rule.tip}</div>
      </div>}
    </div>)}
  </>;
}

function App() {
  const [tab, setTab] = useState("kb");
  const [search, setSearch] = useState("");
  const [article, setArticle] = useState(null);
  const [flowId, setFlowId] = useState(null);
  const [bbSearch, setBbSearch] = useState("");
  const [printerSearch, setPrinterSearch] = useState("");

  const filtered = useMemo(() => {
    if (!search) return KB_ARTICLES;
    const q = search.toLowerCase();
    return KB_ARTICLES.filter(a => a.title.toLowerCase().includes(q) || a.summary.toLowerCase().includes(q) || a.tags.some(t => t.includes(q)));
  }, [search]);

  const grouped = useMemo(() => {
    const g = {};
    filtered.forEach(a => { if (!g[a.category]) g[a.category] = []; g[a.category].push(a); });
    return g;
  }, [filtered]);

  const bbResult = useMemo(() => {
    if (!bbSearch) return null;
    const q = bbSearch.toUpperCase().trim();
    for (const [tech, prefixes] of Object.entries(BB_ROUTING)) {
      if (prefixes.some(p => q.startsWith(p.toUpperCase()) || p.toUpperCase().startsWith(q))) return { tech, ...BB_TECHS[tech] };
    }
    return { tech: null };
  }, [bbSearch]);

  const filteredPrinters = useMemo(() => {
    if (!printerSearch) return PRINTERS;
    const q = printerSearch.toLowerCase();
    return PRINTERS.map(b => ({ ...b, printers: b.printers.filter(p => p.id.includes(q) || p.name.toLowerCase().includes(q) || p.location.toLowerCase().includes(q) || b.building.toLowerCase().includes(q)) })).filter(b => b.printers.length > 0);
  }, [printerSearch]);

  const goArticle = (id) => { setArticle(KB_ARTICLES.find(a => a.id === id)); setTab("kb"); setFlowId(null); };

  const css = `@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap');
  * { margin:0;padding:0;box-sizing:border-box; }
  :root { --bg-primary:#0B1210;--bg-secondary:#121D17;--bg-tertiary:#1A2720;--bg-hover:#1E2E24;--border:#253830;--border-light:#35504A;--text-primary:#E5EBE7;--text-secondary:#8B9E92;--text-muted:#557065;--accent:#3DA66A;--font-mono:'JetBrains Mono',monospace;--font-sans:'Source Sans 3',sans-serif; }
  body { background:var(--bg-primary);color:var(--text-primary);font-family:var(--font-sans);line-height:1.5; }
  .tabs { display:flex;gap:2px;padding:0 24px;background:var(--bg-secondary);border-bottom:1px solid var(--border);overflow-x:auto; }
  .tab { padding:12px 16px;font-size:13px;font-weight:500;color:var(--text-secondary);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:var(--font-sans); }
  .tab:hover { color:var(--text-primary);background:var(--bg-hover); }
  .tab.active { color:var(--accent);border-bottom-color:var(--accent);background:rgba(61,166,106,0.15); }`;

  return <>
    <style>{css}</style>
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      <div style={{background:"var(--bg-secondary)",borderBottom:"1px solid var(--border)",padding:"16px 24px",display:"flex",alignItems:"center",gap:16,position:"sticky",top:0,zIndex:100}}>
        <div style={{background:"#1B6B3A",color:"#ffffff",fontFamily:"var(--font-mono)",fontWeight:700,fontSize:13,padding:"6px 10px",borderRadius:4}}>SU</div>
        <div style={{fontSize:18,fontWeight:600}}>Helpdesk Companion</div>
        <div style={{fontSize:13,color:"var(--text-muted)",marginLeft:"auto",fontFamily:"var(--font-mono)"}}>Stevenson OIT</div>
      </div>
      <div className="tabs">
        {[["kb","Knowledge Base"],["flow","Troubleshoot"],["bb","BB Routing"],["printers","Printer Lookup"],["categorize","Categorizer"],["subnet","Subnet Calc"]].map(([id,label]) =>
          <button key={id} className={"tab" + (tab===id?" active":"")} onClick={() => { setTab(id); if(id==="kb") setArticle(null); if(id==="flow") setFlowId(null); }}>{label}</button>
        )}
      </div>
      {tab === "kb" && !article && <div style={{padding:"16px 24px",background:"var(--bg-primary)",borderBottom:"1px solid var(--border)",position:"sticky",top:57,zIndex:99}}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search articles..." style={{width:"100%",background:"var(--bg-tertiary)",border:"1px solid var(--border)",borderRadius:6,padding:"12px 16px",fontSize:15,color:"var(--text-primary)",fontFamily:"inherit",outline:"none"}} />
      </div>}
      <div style={{flex:1,padding:"20px 24px",maxWidth:1200,margin:"0 auto",width:"100%"}}>
        {tab === "kb" && !article && Object.entries(grouped).map(([cat, arts]) => <div key={cat}>
          <div style={{fontFamily:"var(--font-mono)",fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:1.5,color:"var(--text-muted)",margin:"24px 0 8px"}}>{cat}</div>
          {arts.map(a => <div key={a.id} onClick={() => setArticle(a)} style={{background:"var(--bg-secondary)",border:"1px solid var(--border)",borderRadius:6,padding:"14px 18px",marginBottom:6,cursor:"pointer"}}>
            <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>{a.title}</div>
            <div style={{fontSize:13,color:"var(--text-secondary)"}}>{a.summary}</div>
          </div>)}
        </div>)}
        {tab === "kb" && article && <ArticleView article={article} onBack={() => setArticle(null)} />}

        {tab === "flow" && !flowId && <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {Object.entries(FLOWCHARTS).map(([id,f]) => <div key={id} onClick={() => setFlowId(id)} style={{background:"var(--bg-secondary)",border:"1px solid var(--border)",borderRadius:8,padding:20,cursor:"pointer"}}>
            <h3 style={{fontSize:15,marginBottom:6}}>{f.title}</h3>
            <p style={{fontSize:13,color:"var(--text-muted)"}}>{f.desc}</p>
          </div>)}
        </div>}
        {tab === "flow" && flowId && <Flowchart flowId={flowId} onBack={() => setFlowId(null)} onArticle={goArticle} />}

        {tab === "bb" && <>
          <input value={bbSearch} onChange={e => setBbSearch(e.target.value)} placeholder="Enter course prefix (e.g. ACC, CHEM, PSY)..." style={{width:"100%",background:"var(--bg-tertiary)",border:"1px solid var(--border)",borderRadius:6,padding:"12px 16px",fontSize:15,color:"var(--text-primary)",fontFamily:"inherit",outline:"none",marginBottom:16}} />
          {bbResult && bbResult.tech && <div style={{background:"var(--bg-secondary)",border:"1px solid var(--border)",borderRadius:6,padding:16,textAlign:"center",marginBottom:16}}>
            <div style={{fontSize:20,fontWeight:700,color:bbResult.tech==="Sam Page"?"#3DA66A":bbResult.tech==="Thom Schlitzer"?"#7DDBA0":"#A8B8C0"}}>→ {bbResult.tech}</div>
            <div style={{fontSize:13,fontFamily:"var(--font-mono)",color:"var(--text-muted)"}}>{bbResult.schools}</div>
          </div>}
          {bbResult && !bbResult.tech && <div style={{background:"var(--bg-secondary)",border:"1px solid var(--border)",borderRadius:6,padding:16,textAlign:"center",marginBottom:16,color:"#E5A832"}}>No match — check columns below</div>}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16}}>
            {Object.entries(BB_TECHS).map(([tech,info],i) => <div key={tech} style={{background:"var(--bg-secondary)",border:"1px solid var(--border)",borderRadius:6,overflow:"hidden"}}>
              <div style={{padding:"12px 16px",borderBottom:"1px solid var(--border)",fontWeight:600,fontSize:14,background:i===0?"rgba(27,107,58,0.2)":i===1?"rgba(92,201,122,0.15)":"rgba(168,184,192,0.15)",color:i===0?"#1B6B3A":i===1?"#5CC97A":"#A8B8C0"}}>{tech}<br/><small style={{fontSize:11,fontFamily:"var(--font-mono)",fontWeight:400,color:"var(--text-muted)"}}>{info.schools}</small></div>
              <div style={{padding:"8px 12px",maxHeight:300,overflowY:"auto"}}>{BB_ROUTING[tech].map((p,j) => <div key={j} style={{fontSize:13,color:"var(--text-secondary)",padding:"3px 0",borderBottom:"1px solid var(--border)"}}>{p}</div>)}</div>
            </div>)}
          </div>
        </>}

        {tab === "printers" && <>
          <input value={printerSearch} onChange={e => setPrinterSearch(e.target.value)} placeholder="Search by ID, name, location, or building..." style={{width:"100%",background:"var(--bg-tertiary)",border:"1px solid var(--border)",borderRadius:6,padding:"12px 16px",fontSize:15,color:"var(--text-primary)",fontFamily:"inherit",outline:"none",marginBottom:16}} />
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead><tr>{["ID","Name","Location","Model"].map(h => <th key={h} style={{textAlign:"left",padding:"8px 12px",fontFamily:"var(--font-mono)",fontSize:11,fontWeight:600,textTransform:"uppercase",color:"var(--text-muted)",borderBottom:"1px solid var(--border)"}}>{h}</th>)}</tr></thead>
            <tbody>{filteredPrinters.map(b => <>{<tr key={b.building}><td colSpan={4} style={{fontFamily:"var(--font-mono)",fontWeight:600,color:"#1B6B3A",background:"rgba(27,107,58,0.2)",fontSize:12,padding:"6px 12px"}}>{b.building}</td></tr>}{b.printers.map(p => <tr key={p.id}><td style={{padding:"7px 12px",borderBottom:"1px solid var(--border)",color:"var(--text-muted)",fontFamily:"var(--font-mono)",fontSize:12}}>{p.id}</td><td style={{padding:"7px 12px",borderBottom:"1px solid var(--border)",color:"var(--text-secondary)"}}>{p.name}</td><td style={{padding:"7px 12px",borderBottom:"1px solid var(--border)",color:"var(--text-secondary)"}}>{p.location}</td><td style={{padding:"7px 12px",borderBottom:"1px solid var(--border)",color:"var(--text-secondary)"}}>{p.model}</td></tr>)}</>)}</tbody>
          </table>
        </>}

        {tab === "categorize" && <Categorizer onArticle={goArticle} />}
        {tab === "subnet" && <SubnetCalc />}
      </div>
    </div>
  </>;
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
