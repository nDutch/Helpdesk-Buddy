<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SU Helpdesk Companion</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%2338bdf8' width='32' height='32' rx='4'/><text x='16' y='22' text-anchor='middle' fill='%230a0e14' font-family='monospace' font-weight='bold' font-size='16'>SU</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-primary: #0a0e14;
  --bg-secondary: #111820;
  --bg-tertiary: #1a2230;
  --bg-hover: #1e2a3a;
  --bg-active: #243447;
  --border: #2a3545;
  --border-light: #354560;
  --text-primary: #e0e6ed;
  --text-secondary: #8899aa;
  --text-muted: #556677;
  --accent: #38bdf8;
  --accent-dim: #1e6ea1;
  --accent-glow: rgba(56, 189, 248, 0.15);
  --green: #4ade80;
  --green-dim: rgba(74, 222, 128, 0.15);
  --amber: #fbbf24;
  --amber-dim: rgba(251, 191, 36, 0.15);
  --red: #f87171;
  --red-dim: rgba(248, 113, 113, 0.15);
  --purple: #a78bfa;
  --purple-dim: rgba(167, 139, 250, 0.15);
  --font-mono: 'JetBrains Mono', monospace;
  --font-sans: 'Source Sans 3', sans-serif;
}
body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-sans);
  line-height: 1.5;
}
.app { min-height: 100vh; display: flex; flex-direction: column; }

.header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-badge {
  background: var(--accent);
  color: var(--bg-primary);
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 13px;
  padding: 6px 10px;
  border-radius: 4px;
  letter-spacing: 0.5px;
  white-space: nowrap;
}
.header-title { font-size: 18px; font-weight: 600; }
.header-sub { font-size: 13px; color: var(--text-muted); margin-left: auto; font-family: var(--font-mono); }

.search-wrap {
  padding: 16px 24px;
  background: var(--bg-primary);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 57px;
  z-index: 99;
}
.search-box {
  width: 100%;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 16px 12px 42px;
  font-size: 15px;
  color: var(--text-primary);
  font-family: var(--font-sans);
  outline: none;
  transition: border-color 0.2s;
}
.search-box:focus { border-color: var(--accent); }
.search-box::placeholder { color: var(--text-muted); }
.search-icon {
  position: absolute;
  left: 38px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 16px;
}

.tabs {
  display: flex;
  gap: 2px;
  padding: 0 24px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}
.tab {
  padding: 12px 18px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  border: none;
  background: none;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all 0.15s;
  font-family: var(--font-sans);
}
.tab:hover { color: var(--text-primary); background: var(--bg-hover); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--accent-glow); }

.content { flex: 1; padding: 20px 24px; max-width: 1200px; margin: 0 auto; width: 100%; }

.category-label {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  margin: 24px 0 8px;
  padding-left: 2px;
}
.category-label:first-child { margin-top: 0; }

.article-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px 18px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: all 0.15s;
}
.article-card:hover { border-color: var(--border-light); background: var(--bg-hover); }
.article-card-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.article-card-summary { font-size: 13px; color: var(--text-secondary); line-height: 1.4; }

.article-detail {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.article-header { padding: 20px 24px; border-bottom: 1px solid var(--border); }
.article-back {
  font-size: 12px;
  font-family: var(--font-mono);
  color: var(--accent);
  cursor: pointer;
  border: none;
  background: none;
  margin-bottom: 12px;
  padding: 0;
}
.article-back:hover { text-decoration: underline; }
.article-detail-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.article-detail-cat {
  font-size: 12px;
  font-family: var(--font-mono);
  color: var(--accent);
  background: var(--accent-glow);
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
}
.article-body { padding: 20px 24px; }
.article-section-label {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--accent);
  margin: 20px 0 8px;
}
.article-section-label:first-child { margin-top: 0; }

.step-list { list-style: none; padding: 0; }
.step-item {
  padding: 8px 0 8px 16px;
  border-left: 2px solid var(--border);
  font-size: 14px;
  margin-bottom: 2px;
  transition: border-color 0.15s;
}
.step-item:hover { border-left-color: var(--accent); }
.step-item.indent { margin-left: 20px; color: var(--text-secondary); }
.step-item.warning {
  border-left-color: var(--amber);
  background: var(--amber-dim);
  padding: 8px 12px 8px 16px;
  border-radius: 0 4px 4px 0;
}

.template-box {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px 16px;
  padding-right: 80px;
  font-size: 13px;
  color: var(--text-secondary);
  white-space: pre-wrap;
  font-family: var(--font-mono);
  line-height: 1.6;
  position: relative;
  max-height: 300px;
  overflow-y: auto;
}
.copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background: var(--accent);
  color: var(--bg-primary);
  border: none;
  border-radius: 4px;
  padding: 4px 12px;
  font-size: 11px;
  font-family: var(--font-mono);
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}
.copy-btn:hover { opacity: 0.85; }
.copy-btn.copied { background: var(--green); }

.escalation-box {
  background: var(--purple-dim);
  border: 1px solid rgba(167, 139, 250, 0.3);
  border-radius: 6px;
  padding: 10px 14px;
  font-size: 13px;
  color: var(--purple);
  font-weight: 500;
}
.resources-box {
  background: var(--green-dim);
  border: 1px solid rgba(74, 222, 128, 0.3);
  border-radius: 6px;
  padding: 10px 14px;
  font-size: 13px;
  color: var(--green);
  line-height: 1.6;
}

.printer-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.printer-table th {
  text-align: left;
  padding: 8px 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg-secondary);
  z-index: 1;
}
.printer-table td { padding: 7px 12px; border-bottom: 1px solid var(--border); color: var(--text-secondary); }
.printer-table tr:hover td { background: var(--bg-hover); color: var(--text-primary); }
.printer-building-row td {
  font-family: var(--font-mono);
  font-weight: 600;
  color: var(--accent);
  background: var(--accent-glow);
  font-size: 12px;
  padding: 6px 12px;
}
.printer-id { font-family: var(--font-mono); color: var(--text-muted); font-size: 12px; }

.bb-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
@media (max-width: 800px) { .bb-grid { grid-template-columns: 1fr; } }
.bb-col { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.bb-col-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 14px; }
.bb-col-header small { display: block; font-size: 11px; font-family: var(--font-mono); font-weight: 400; color: var(--text-muted); margin-top: 2px; }
.bb-col-header.sam { background: var(--accent-glow); color: var(--accent); }
.bb-col-header.thom { background: var(--green-dim); color: var(--green); }
.bb-col-header.cindy { background: var(--purple-dim); color: var(--purple); }
.bb-prefix-list { padding: 8px 12px; max-height: 300px; overflow-y: auto; }
.bb-prefix { font-size: 13px; color: var(--text-secondary); padding: 3px 0; border-bottom: 1px solid var(--border); }
.bb-prefix:last-child { border-bottom: none; }
.bb-search-result { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 6px; padding: 16px 20px; margin-bottom: 16px; text-align: center; }
.bb-result-tech { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.bb-result-schools { font-size: 13px; font-family: var(--font-mono); color: var(--text-muted); }

.flow-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 24px; margin-bottom: 12px; }
.flow-question { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
.flow-options { display: flex; flex-direction: column; gap: 8px; }
.flow-btn {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 16px;
  font-size: 14px;
  color: var(--text-primary);
  cursor: pointer;
  text-align: left;
  font-family: var(--font-sans);
  transition: all 0.15s;
}
.flow-btn:hover { border-color: var(--accent); background: var(--accent-glow); }
.flow-result { background: var(--green-dim); border: 1px solid rgba(74, 222, 128, 0.3); border-radius: 8px; padding: 20px; }
.flow-result h3 { color: var(--green); font-size: 15px; margin-bottom: 8px; }
.flow-result p { color: var(--text-secondary); font-size: 14px; line-height: 1.6; }
.flow-result .action { color: var(--text-primary); font-weight: 500; }
.flow-restart {
  margin-top: 16px;
  background: none;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 8px 16px;
  border-radius: 4px;
  cursor: pointer;
  font-family: var(--font-sans);
  font-size: 13px;
}
.flow-restart:hover { border-color: var(--accent); color: var(--accent); }
.flow-breadcrumbs { font-size: 12px; font-family: var(--font-mono); color: var(--text-muted); margin-bottom: 16px; line-height: 1.6; }
.flow-breadcrumbs span { color: var(--accent); }
.flow-select-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 600px) { .flow-select-grid { grid-template-columns: 1fr; } }
.flow-select-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.15s;
}
.flow-select-card:hover { border-color: var(--accent); background: var(--accent-glow); }
.flow-select-card h3 { font-size: 15px; margin-bottom: 6px; }
.flow-select-card p { font-size: 13px; color: var(--text-muted); }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-state h3 { font-size: 16px; margin-bottom: 8px; color: var(--text-secondary); }
.view-article-btn {
  margin-top: 12px;
  background: none;
  border: 1px solid rgba(74,222,128,0.3);
  color: var(--green);
  padding: 6px 14px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  font-family: var(--font-mono);
}
.view-article-btn:hover { background: var(--green-dim); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

// ─── DATA ────────────────────────────────────────────────────────────
const KB_ARTICLES = [
  { id:"account-restricted", title:"Account Restricted", category:"Login / Password", tags:["restricted","login","myaccount","jason"], summary:"Accounts become restricted, usually after a break. myaccount.stevenson.edu shows 'Account Restricted Contact Admin' in red. Won't show in ADCheck.", steps:["User tries to change password on myaccount.stevenson.edu and sees 'Account Restricted Contact Admin' in red","Make a ticket — Jason will unrestrict the account","Keep the Teams chat to just MFA resets or temp passwords, NOT account restrictions"], template:"Your account was unrestricted, and you can now follow the steps in [faq id=163] to change your password. If you have any further issues, let us know.", escalation:"Jason (via ticket)" },
  { id:"domain-unavailable", title:"Domain Isn't Available", category:"Login / Password", tags:["domain","login","ethernet","laptop","cached","credentials"], summary:"Device can't communicate with Domain Controller. Must be plugged into ethernet. Laptops cache credentials for 60 days.", steps:["Confirm the device is plugged into ethernet","For laptops: first login requires ethernet, credentials cache for 60 days","After 60 days, plug back into ethernet to re-authenticate with the domain controller"], template:null, escalation:null },
  { id:"password-reset", title:"Password Resets", category:"Login / Password", tags:["password","reset","myaccount","forgot","sync"], summary:"User-driven process through myaccount.stevenson.edu. Fixes many sync issues across systems.", steps:["Go to https://myaccount.stevenson.edu/","Click 'Forgot your password' — enter username and captcha","Code sent to email of choice — proceed with password reset","User prompted to use Microsoft Authenticator (separate from O365 entry — ADSelfService rotating 6-digit code)","Verify the reset worked by asking them to sign into any Stevenson entity"], template:null, escalation:null },
  { id:"suspicious-activity", title:"Suspicious Activity (O365)", category:"Login / Password", tags:["suspicious","risky","flagged","compromised","azure","entra","mfa","jeremy"], summary:"Azure/AD/M365 flags unusual logins. User locked out of portal.office.com. System admin Jeremy Haas clears risky flags.", steps:["Change ticket type to Technology/OIT → Systems","Copy in all user information","Note that the user has a risky sign-in","Jeremy Haas (system admin) or a global admin clears the risky flag","After flag is removed: user must reset password AND MFA"], template:"We removed the risky flag on your account. You can go to https://myaccount.stevenson.edu/ and click the 'Forgot your password' button to reset your password and when you sign into https://portal.office.com it will make you enroll in MFA again. Reach back out if you have any issues.", escalation:"Technology/OIT → Systems (Jeremy Haas)" },
  { id:"external-email-change", title:"External Email Change", category:"Login / Password", tags:["external","email","change","identity","id","verification"], summary:"User wants to change external email tied to SU account. Identity verification required.", steps:["Get their new external email address","Get a copy/photo of their student ID to prove identity","If it doesn't match, speak to the helpdesk manager","Once verified, send ID copy and new external email to the helpdesk manager","Attach both to the ticket"], template:null, escalation:"Helpdesk Manager" },
  { id:"username-lookup", title:"How Can a User Lookup Their Username?", category:"Login / Password", tags:["username","lookup","find","webxpress"], summary:"Direct users to webxpress.stevenson.edu to find their username.", steps:["Go to https://webxpress.stevenson.edu/","Click 'What's My User ID?' (bottom right)","Enter last name + SSN or Student ID number","Click submit — next screen shows username"], template:null, escalation:null },
  { id:"restricted-vs-locked-vs-disabled", title:"Restricted vs Locked vs Disabled", category:"Login / Password", tags:["restricted","locked","disabled","error","myaccount"], summary:"Three different account states with different fixes. Check error message on myaccount.stevenson.edu.", steps:["Go to myaccount.stevenson.edu → Forgot my password → enter username","Read the error message carefully — it tells you which state","LOCKED → User can unlock themselves (FAQ 7)","RESTRICTED → Only Jason can unrestrict. Put 'restricted account' in ticket subject","DISABLED → Most serious. Shows in ADCheck and myaccount. Put 'disabled account' in ticket subject"], template:null, escalation:"Jason (restricted) / Ticket with subject line (disabled)" },
  { id:"alumni", title:"Alumni", category:"Account Provisioning", tags:["alumni","graduated","access","6 months"], summary:"Auto process runs ~6 months after graduation. NO access after that. Staff alumni contact their previous dean.", steps:["Automatic process removes access ~6 months after graduation","No exceptions for students","Staff in Alumni container: have them reach out to previous dean if they need teaching access","FAQ 159 has the full policy"], template:null, escalation:null, resources:"Tax Docs: 443-334-3500 / studentaccounts@stevenson.edu (Business Office: 443-334-2746 for staff) | Transcripts: 443-334-2206 / registrar@stevenson.edu | Handshake: stevenson.edu/career-connection/handshake/" },
  { id:"parent-proxy", title:"Parent/Proxy Login", category:"Account Provisioning", tags:["parent","proxy","login"], summary:"Parent/proxy accounts — auto-assigns when ticket type is set correctly. ⚠️ Ian Rivere info is outdated.", steps:["Set ticket type: Technology: OIT → I Can't Login / Password Issue → I am a Parent / Proxy (auto-assigns)","Get the child's student ID → paste ADCheck in ticket","Get parent's email and phone number, CC them on ticket","⚠️ NOTE: KB references Ian Rivere who no longer works at SU — confirm current handler"], template:null, escalation:"Auto-assigned via ticket type (confirm current handler)" },
  { id:"account-setup-instructions", title:"Account Setup Instructions", category:"Account Provisioning", tags:["setup","provisioned","new","account","instructions","email"], summary:"Setup instructions auto-email to external address. If it fails, use 'Manual Account Setup Instructions' bulk action. Never tell users their external email or username.", steps:["Instructions auto-email to external address when account is provisioned","If it fails: run bulk action 'Manual Account Setup Instructions' (bottom left of ticket window)","Confirm and accept — instructions sent. No risk if account isn't active.","⚠️ NEVER tell a user their external email address or username. Direct them to webxpress.stevenson.edu"], template:null, escalation:null },
  { id:"mfa-instructions", title:"MFA Instructions", category:"Account Provisioning", tags:["mfa","authenticator","qr","code","reset","enroll"], summary:"For first-time MFA enrollment or after reset. QR code at portal.office.com. If reset needed, contact TEAM HELPDESK chat.", steps:["If MFA was reset: user must clear old Stevenson entry in Authenticator app first","  → Settings cog (top right) → select entry → 'Remove Account'","Go to https://portal.office.com/ — QR code will appear","In Authenticator: Plus button (top right) → 'Work or school account' → 'Scan QR Code'","Enter the required number to confirm setup","Alternative: users can use phone calls or SMS codes — select 'I want to set up a different method'","For MFA resets: reach out to TEAM HELPDESK chat with the username"], template:"Hello,\n\nWe've reset your MFA - remove the existing entry in your app and then visit https://portal.office.com/ to re-enroll - press add in your app → work or school → scan the code, and you should be good!\n\nHowever, we now have more ways to authenticate besides the app. You can also select your phone and receive calls to authenticate or SMS codes. Select \"I want to set up a different method\" when prompted to get the app.\n\nThank you,\n[Tech Name]", escalation:"TEAM HELPDESK chat (for MFA resets)" },
  { id:"name-change", title:"Name Change / Username Change", category:"Account Provisioning", tags:["name","username","change","registrar","directory"], summary:"Username changes need a reason. Name changes must go through registrar first, then Directory Listing Correction.", steps:["USERNAME CHANGE: Get desired new username and a reason (required before making change)","NAME CHANGE: Confirm user submitted a 'Name change request' with the registrar first","  → If not, they need to do that before IT can act","Once confirmed: change ticket type to Technology/OIT → Directory Listing Correction","Admin Apps team updates Colleague → Systems team updates Active Directory"], template:null, escalation:"Technology/OIT → Directory Listing Correction" },
  { id:"returning-students", title:"Returning Students", category:"Account Provisioning", tags:["returning","student","reactivate","aup","provision"], summary:"Usually still have an account. May need AUP re-agreement. Accounts auto-reprovision. OIT cannot call registrar as of 3/18/2025.", steps:["Returning students likely have existing account (but OneDrive/email content may be gone if it's been a while)","AUP: Set account expiration from 'never' to a close date in AD, send user to sucloud.stevenson.edu to re-agree","Accounts auto-reprovision when student returns","If it doesn't work: confirm enrollment status with registrar","⚠️ OIT cannot contact registrar by phone as of 3/18/2025 — tell the student to contact registrar themselves","If still not working: escalate ticket to helpdesk manager"], template:null, escalation:"Helpdesk Manager" },
  { id:"sso-instructions", title:"SSO Instructions Email", category:"Account Provisioning", tags:["sso","new student","activation","setup","accepted"], summary:"For students only (not staff/faculty). Full account activation walkthrough. Accepted → deposit → student container.", steps:["Get username at webxpress.stevenson.edu → 'What's my User ID'","Go to myaccount.stevenson.edu → 'Forgot your Password'","Enter username → captcha → continue","Select external email from dropdown → continue","Enter verification code from email","Install Microsoft Authenticator → 'Work or school account' → scan QR code → enter 6-digit code","Set new SSO password","Agree to AUP at sucloud.stevenson.edu/LoginPolicy.jsp","Access portal at https://now.stevenson.edu/"], template:"Welcome to Stevenson University!\n\nTo activate Your Single Sign-On, follow the step-by-step instructions below. Please use a computer or laptop to activate your SSO. Your smartphone or tablet may not work for this process.\n\n1. Get your username at https://webxpress.stevenson.edu - select \"What's my User ID\" at the bottom right\n2. Go to the Account Activation Website at https://myaccount.stevenson.edu\n3. Select the \"Forgot your Password\" option\n4. Enter your username you found at the first step\n5. Enter the security Captcha and select Continue\n6. Select your provided external email address from the drop-down menu and select \"continue\"\n7. Check your email for a verification code and enter it in the box provided\n8. You'll be prompted to install Microsoft Authenticator. Download from: https://www.microsoft.com/en-us/security/mobile-authenticator-app\n9. In the Microsoft Authenticator app - select \"Work or school account\" - and \"Scan QR Code\" - then scan the QR code on screen. You'll then be given a rotating 6-digit code - enter this code into the box.\n10. Set your new SSO Password following the requirements on the website.\n\nAfter you have done these steps, you will need to agree to the Acceptable Use Policy by visiting https://sucloud.stevenson.edu/LoginPolicy.jsp, log in, and the policy should pop up for you.\n\nOnce completed, you can login to the student portal using: https://now.stevenson.edu/\n\nIf you need further assistance, feel free to reach out to us.\n\nTechnology Support Center\nStevenson University\n443-334-3000 or toll-free 866-344-8190\nhelpdesk@stevenson.edu", escalation:null },
  { id:"student-doesnt-exist", title:"Student Doesn't Exist in System", category:"Account Provisioning", tags:["adcheck","not found","doesnt exist","new student","provision"], summary:"ADCheck returns nothing. Verify info, check start date, route accordingly. ⚠️ Ian Rivere info outdated.", steps:["Confirm you entered the right ID and checked AD Users and Computers","Is this a new student trying to access before provisioning?","Check their start date:","  → MORE than 6 months away: Resolve ticket. Auto-provisioned, they'll get an email.","  → LESS than 6 months away: Change type to Technology/OIT → Accounts Intake → Student Account Provisioning","  → ⚠️ KB says assign to Ian Rivere (no longer at SU) — confirm current handler","  → Contact registrar with student info to confirm active status","ADMISSIONS ACCOUNT issues (application process): not OIT — send to Admissions@stevenson.edu"], template:null, escalation:"Technology/OIT → Accounts Intake → Student Account Provisioning" },
  { id:"suo-alumni", title:"SUO Alumni", category:"Account Provisioning", tags:["suo","online","alumni"], summary:"SUO alumni move to User Lifecycle After/Alumni container. No on-prem access. 6 months of M365 only.", steps:["SUO alumni are in User Lifecycle After/Alumni container (not EDUsers/Students)","Container blocks on-prem resources (Self Service, Blackboard)","Only get 6 months of M365 (Email, Office Apps, OneDrive) after graduation","Accounts should be active in Entra — confirm with helpdesk manager","If restricted: ask helpdesk manager to remove restriction, have user retry"], template:null, escalation:"Helpdesk Manager" },
  { id:"adobe-access", title:"Adobe Account Access", category:"Adobe", tags:["adobe","creative cloud","access","license"], summary:"Everyone can get Adobe CC. Students need graphic design course enrollment. Faculty/staff need a reason.", steps:["Students: must be enrolled in a graphic design course — get course ID","Faculty/Staff: must provide a reason for access. Confirm account info.","Change ticket type to Technology/OIT → Adobe → Permissions Request"], template:null, escalation:"Technology/OIT → Adobe → Permissions Request" },
  { id:"adobe-personal", title:"Adobe Installation (Personal Device)", category:"Adobe", tags:["adobe","personal","install","device"], summary:"SU doesn't support personal devices. Point them to creativecloud.com.", steps:["SU does not support personal devices for liability reasons","Direct user to https://creativecloud.com/ to install themselves"], template:null, escalation:null },
  { id:"adobe-su-device", title:"Adobe Installation (SU Device)", category:"Adobe", tags:["adobe","install","su device","workstation","push"], summary:"Admins push Adobe remotely. Get workstation name, leave PC on/logged off/ethernet/power. 30 min - 1 hr.", steps:["Get the user's workstation name","Leave computer plugged in/powered in and LOGGED OFF","Laptops: must be plugged into ethernet AND power","Install takes 30 minutes to 1 hour","Change ticket type to Technology/OIT → Adobe → Install Request"], template:null, escalation:"Technology/OIT → Adobe → Install Request" },
  { id:"bb-cant-login", title:"Blackboard — I Can't Login", category:"Blackboard", tags:["blackboard","login","bb","username"], summary:"Confirm using USERNAME not USERNAME@stevenson.edu. Try password change. Escalate to Jason if still failing.", steps:["Confirm user is logging in with USERNAME (not USERNAME@stevenson.edu)","Check when they last changed their password — if it's been a while, have them change it and retry","If still failing: assign ticket to Jason to check if user is enabled in BB","Provide account information in ticket notes"], template:null, escalation:"Jason" },
  { id:"no-audio", title:"Classroom — No Audio", category:"Classroom Technology", tags:["audio","sound","classroom","projector","extron","epson"], summary:"Older rooms: check aux cable. Newer rooms: Extron volume, PC output set to 'Epson PJ', volume up on PC.", steps:["OLDER CLASSROOMS: Confirm aux cable is plugged into the PC","NEWER CLASSROOMS (sound from projector):","  → Volume knob on Extron control panel is up and not muted","  → PC audio output is set to 'Epson PJ'","  → Volume is up and enabled on the PC","If none of that works: power cycle everything"], template:null, escalation:null },
  { id:"projector-bluescreen", title:"Projector — Blue Screen", category:"Classroom Technology", tags:["projector","blue","screen","bluescreen","classroom","podium"], summary:"Full troubleshooting flow: verify details → basic checks → power cycle podium switch → confirm or escalate.", steps:["1. Get professor name, room number, issue description","2. Go to the room — verify issue persists","3. Basic checks: PC & projector ON? Correct input? Input/output lights on podium lit? Cables secure?","4. Power cycle podium: Find red power switch box → flip 'Sequence' switch opposite direction → wait for Input/Link/Output lights OFF → 30 sec → flip back → lights ON → 30 sec → test","5. If fixed: close ticket","6. If not: check KB, ask other students, update ticket with detailed notes, escalate","7. Document exact steps and final status in Web Help Desk","MAC SPECIFIC: If on/off button is flashing — hold BOTH buttons ~30 sec until flashing stops"], template:null, escalation:"Escalate with detailed troubleshooting notes" },
  { id:"directory-info", title:"Incorrect Directory Info", category:"Directory", tags:["directory","incorrect","listing","correction"], summary:"Directory maintained by Admin Apps team. Get correct info + reason, change ticket type.", steps:["Get the user's correct information","Get a reason for the change (incorrect listing, office move, etc.)","Change ticket type to Technology/OIT → Directory Listing Correction"], template:null, escalation:"Technology/OIT → Directory Listing Correction" },
  { id:"encrypt-email", title:"How to Encrypt Emails (S/MIME)", category:"Email / Webmail", tags:["encrypt","smime","certificate","outlook","email"], summary:"Requires valid reason. Certificate from N&I team. Configure in Outlook Trust Center.", steps:["Ask user for a reason and use purpose — no reason, no certificate","Obtain certificate from Network & Infrastructure team","Import certificate (double click, follow prompts)","Configure Outlook: File → Options → Trust Center → Trust Center Settings → 'Email Security'","Under 'Encrypted email' select 'Settings'","Choose certificate under 'Signing Certificate' and 'Encryption Certificate'","Optionally configure encryption options (encrypt attachments, all outgoing messages)","Apply and save"], template:null, escalation:"Network & Infrastructure team (certificate)" },
  { id:"no-license", title:"Microsoft Account — No License", category:"Email / Webmail", tags:["license","microsoft","365","o365","a5"], summary:"Everyone gets O365 by default. If auto process fails: Students → A5 for students. Faculty/Staff → A5 for faculty. Assign to helpdesk manager.", steps:["All users get a license by default — sometimes auto process fails","Students: Microsoft 365 A5 for students use benefit","Faculty/Staff: Microsoft 365 A5 for faculty","Assign ticket to helpdesk manager with user info and proof of status"], template:null, escalation:"Helpdesk Manager" },
  { id:"shared-inbox", title:"Shared Inbox Access", category:"Email / Webmail", tags:["shared","inbox","mailbox","outlook","email"], summary:"Need access first (ticket to Systems). Classic Outlook: manual add via Account Settings. New Outlook: auto under 'Shared with me'.", steps:["GETTING ACCESS: Change type to Technology/OIT → Email/Webmail Issue → Shared Inbox Access, note for Systems","If user doesn't have access: find out purpose and club/org affiliation, send to Systems for approval","CLASSIC OUTLOOK: Restart Outlook first. If that doesn't work:","  → File → Account Settings → Account Settings → Email tab → highlight account → Change","  → More Settings → Advanced → Add → type shared email → OK → OK → Next → Finish → Close","NEW OUTLOOK (O365): Folder pane → 'Shared with me' → expand → find shared mailbox (automatic, no manual add)"], template:null, escalation:"Technology/OIT → Email/Webmail Issue → Shared Inbox Access" },
  { id:"network-ticket-procedure", title:"Network Issue Procedure", category:"Networking", tags:["network","n&i","ticket","procedure","wifi","connectivity"], summary:"Info to gather BEFORE sending any ticket to N&I.", steps:["ALWAYS ASK:","  → Building and room number (residential: include room letter)","  → When did the issue start?","  → Where does the issue occur? (on/off campus, specific building/room)","  → Availabilities for in-person visit","ADDITIONAL (depending on issue type):","  → Extension (phone issues)","  → Wired or wireless?","  → Which services are having issues?"], template:"Please provide the following:\n- Building and room number (if its a residential ticket, please include the specific room letter):\n- When did the issue start?:\n- Where does the issue occur? (on or off campus, if on campus please give us the specific building and room):\n- Availabilities in case we need to come out in person to take a look:\n\nDepending on what the issue is (phone, server, AD, network, etc.) additional questions we would like to know:\n- Extension:\n- Are you connected wired or wireless?:\n- Which services are you having issues with?:", escalation:"N&I team" },
  { id:"ethernet-port", title:"Ethernet Port Not Working", category:"Networking", tags:["ethernet","port","patch","closet","cable","wired"], summary:"Check ports, find network closet, verify patch panel connection to switch, patch if missing. Escalate if still down.", steps:["Note the numbers on the port — are ALL ports dead or just one?","Find the nearest network closet → locate the black patch panel with white labels","Find the port numbers you noted on the panel","Is there a cable from that port to the silver networking switch? No cable = no link","If missing: NEATLY patch a cable from the switch to the correct port on the panel","Go back to the original port and test connectivity","If still not working: Technology/OIT → Network → Connectivity (Wired or Wireless), note steps you tried"], template:null, escalation:"Technology/OIT → Network → Connectivity (Wired or Wireless)" },
  { id:"rdp-access", title:"Grant RDP Access", category:"Networking", tags:["rdp","remote","desktop","access","ad"], summary:"Requires AD rights. Changes on local machine + 3 AD changes. User confirms at personalrdp.stevenson.edu in ~30 min.", steps:["ON LOCAL MACHINE: Edit Local Users and Groups → Groups → Remote Desktop Users → add username","IN AD (1): User attributes → find swareRDPHost → add PC name → save","IN AD (2): EDUSERS → Cloud Groups → Personal Desktop Users → add username","IN AD (3): EDUSERS → Cloud Groups → Personal Desktop Workstations → add PC name","User confirms in ~30 min at https://personalrdp.stevenson.edu/"], template:null, escalation:null },
  { id:"personal-rdp", title:"Personal Remote Desktop", category:"Networking", tags:["rdp","remote","personal","desktop"], summary:"Machine must be on + ethernet. User goes to personalrdp.stevenson.edu, downloads RDP profile, logs in with SSO.", steps:["Machine must be powered on and plugged into ethernet","Go to https://personalrdp.stevenson.edu/","Download the RDP profile associated with their account","Log in with SSO credentials"], template:null, escalation:null },
  { id:"eduroam", title:"What is Eduroam?", category:"Networking", tags:["eduroam","wifi","wireless","visitor"], summary:"Federated wireless network for universities. At SU: login with username@stevenson.edu + SSO password.", steps:["Eduroam lets users from participating institutions use WiFi at other campuses with home credentials","At Stevenson: login with username@stevenson.edu and SSO password","More info: https://incommon.org/eduroam/"], template:null, escalation:null },
  { id:"new-equipment", title:"New Equipment Request", category:"Equipment", tags:["equipment","new","computer","purchase","budget"], summary:"Under 3 yrs: troubleshoot first. Over 3 yrs: new equipment. Need age, recipient, and budget code. Mike McGonigle handles orders.", steps:["Machine under 3 years: troubleshoot first before replacing","Machine over 3 years: proceed with new equipment request","How old is the previous machine? (Over 5 yrs = can't reuse, under 5 = possibly)","Who is getting the machine? (for inventory — their dept is responsible for purchase)","What is their budget code? (REQUIRED — can't fulfill without it)","Change ticket type to Technology/OIT → New Equipment Request","Mike McGonigle handles all new equipment orders"], template:null, escalation:"Technology/OIT → New Equipment Request (Mike McGonigle)" },
  { id:"new-hire", title:"New Hire Technology Request", category:"Equipment", tags:["new hire","onboarding","project","computer","phone","datatel","colleague"], summary:"Break into separate tickets for each service. Main ticket becomes Project assigned to you. Link all child tickets.", steps:["Main ticket → set to PROJECT, assign to yourself. Client = person who submitted request (not the new hire)","Create separate tickets for each need:","  1. Computer/Software: Technology/OIT → New Hire Technology Request | Subject: 'Re-Image for New Hire (Start Date)'","  2. Datatel/Informer/WebXpress: Technology/OIT → Colleague → New Account or Changes | Subject: 'New Hire Account Access (Start Date)'","  3. Phone: Technology/OIT → Phone Issue → Phone Move/Number Reassignment | Subject: 'New Hire Phone Setup (Start Date)'","  4. Network Drive: Technology/OIT → Network Drive Mappings → Add Drive | Subject: 'New Hire Drive Access (Start Date)'","  5. Etrieve/Docescan: Technology/OIT → Etrieve → New Account | Subject: 'New Hire Account Access'","Note all ticket numbers and link to parent project ticket","Don't resolve project until ALL steps complete"], template:null, escalation:null },
  { id:"phone-break-work", title:"Phone — Break/Work Mode", category:"Phones", tags:["phone","break","work","mode"], summary:"Break: solid red, for personal time. Work: blinking red, for ticket entry/walk-ins. Code 0,0,7,# extends indefinitely.", steps:["BREAK MODE: Press 'Break' button (solid red). For food, bathroom, stepping out. Press again to end.","WORK MODE: Auto-activates 30 sec after login and after calls (blinking red).","  → To extend indefinitely: Press 'Work' (starts flashing) → 'Tally' button → dial 0, 0, 7, # → solid red","  → Disable by pressing 'Work' again","  → Use for: entering ticket info, walk-ins, classroom issues, anything away from phone"], template:null, escalation:null },
  { id:"phone-login", title:"Log Into Shared Phone", category:"Phones", tags:["phone","login","shared","acd"], summary:"ACD login for shared extensions. Need login? Contact Eric Lewis. Press Login → 3-digit code → #.", steps:["Need an ACD login? Contact Eric Lewis (wlewis3@stevenson.edu)","Press 'Login' button → enter 3-digit code → # → 'Hello [Your name]' confirms login"], template:null, escalation:"Eric Lewis (wlewis3@stevenson.edu)" },
  { id:"phone-outgoing", title:"Place Outgoing Calls", category:"Phones", tags:["phone","call","outgoing","external","internal","dial"], summary:"Internal: 4-Digit Extension button → extension. External: 4-Digit Extension → 8, 1, then number. Newer phones: TechCon* button.", steps:["INTERNAL: Pick up → '4-Digit Extension' button → enter extension → rings after 4th number","EXTERNAL: Pick up → '4-Digit Extension' button → dial 8, 1, then phone number (xxx-xxx-xxxx)","NEWER PHONES: Pick up → 'TechCon*' button → dial 8, 1, then phone number"], template:null, escalation:null },
  { id:"change-toner", title:"Change Toner", category:"Printers", tags:["toner","change","sharp","printer","cartridge"], summary:"Two printer types: Sharp MX-6071 (big, longer cartridges) and MX-3070 (small, tiny cartridges in white boxes). Recycle old toner.", steps:["SHARP MX-6071 (Big): Open top cover → 4 colors → empty one is popped out → pull out → replace same orientation → close","SHARP MX-3070 (Small): Open main toner cover → 4 colors → low one popped out → swap same orientation → close","Both: Printer resumes held jobs automatically after closing","RECYCLE both the new toner box and old cartridge in reserved boxes in both tech offices"], template:null, escalation:null },
  { id:"printer-id", title:"ID Not Recognized by Printer", category:"Printers", tags:["printer","id","card","proxid","papercut","windsx","security"], summary:"Card values live in WinDSX → sync to Papercut nightly. If mismatch: security updates WinDSX, wait for overnight sync.", steps:["Ask user for numbers on the back of their ID card","Only Papercut admins can check Papercut values","If numbers don't match Papercut: card was never properly associated in WinDSX","DON'T just fix in Papercut — nightly sync will overwrite it","Security needs to update the card value in WinDSX","After security makes changes: user waits for overnight process, then card should work"], template:null, escalation:"Security (WinDSX update) → overnight sync to Papercut" },
  { id:"webprint", title:"WebPrint", category:"Printers", tags:["webprint","print","wireless","followyou","papercut","network"], summary:"Print wirelessly via supapercut.stevenson.edu. Must be on Eduroam or Stevenson wireless.", steps:["WebPrint lets users print to FollowYou queue wirelessly from any device — no drivers needed","URL: https://supapercut.stevenson.edu","NOT WORKING? First check their network — only works on Eduroam or Stevenson wireless networks"], template:null, escalation:null },

const FLOWCHARTS = {
  "login-issue":{title:"User Can't Login",description:"Walk through login/password troubleshooting",start:"q1",nodes:{q1:{question:"What system is the user trying to log into?",options:[{label:"Stevenson portal / myaccount / Self Service",next:"q2"},{label:"Blackboard",next:"bb1"},{label:"Office 365 / Outlook / Teams",next:"o365_1"},{label:"Campus computer (Windows login)",next:"pc1"}]},q2:{question:"Go to myaccount.stevenson.edu → Forgot my password → enter username. What error do you see?",options:[{label:"Account Restricted Contact Admin (in red)",next:"r_restricted"},{label:"Account is Locked",next:"r_locked"},{label:"Account is Disabled",next:"r_disabled"},{label:"No error, just can't reset",next:"q3"},{label:"User doesn't show up at all",next:"q4"}]},q3:{question:"Is the user getting the verification code to their email?",options:[{label:"Yes but the reset isn't working after that",next:"r_mfa_issue"},{label:"No, they're not receiving the code",next:"r_no_code"},{label:"They don't know their username",next:"r_username_lookup"}]},q4:{question:"Did you check ADCheck and Active Directory Users and Computers?",options:[{label:"Yes — nothing comes up",next:"q4b"},{label:"I haven't checked yet",next:"r_check_ad"}]},q4b:{question:"Is this a new student?",options:[{label:"Yes — start date is MORE than 6 months away",next:"r_auto_provision"},{label:"Yes — start date is LESS than 6 months away",next:"r_manual_provision"},{label:"No — they should have an existing account",next:"r_escalate_manager"}]},bb1:{question:"Is the user logging in with their USERNAME (not username@stevenson.edu)?",options:[{label:"They were using @stevenson.edu — fixed it",next:"r_bb_email_fix"},{label:"Yes, using correct username format",next:"bb2"}]},bb2:{question:"When did they last change their password?",options:[{label:"Recently / not sure — had them reset it",next:"r_bb_still_failing"},{label:"It's been a while — having them change it now",next:"r_bb_password_change"}]},o365_1:{question:"Is the user getting a specific error message?",options:[{label:"Account flagged / suspicious activity",next:"r_suspicious"},{label:"MFA prompt issues (new phone, not working)",next:"r_mfa_reset"},{label:"No license / can't access apps",next:"r_no_license"},{label:"General 'can't sign in' error",next:"r_password_reset"}]},pc1:{question:"What error is showing on the Windows login screen?",options:[{label:"Domain isn't available / can't reach domain",next:"r_domain"},{label:"Password incorrect but they're sure it's right",next:"r_cached_creds"},{label:"Other error",next:"r_password_reset"}]},r_restricted:{result:true,title:"Account Restricted",action:"Make a ticket. Jason will unrestrict the account. Keep Teams chat to MFA resets/temp passwords only — NOT restrictions.",template:"Your account was unrestricted, and you can now follow the steps in [faq id=163] to change your password. If you have any further issues, let us know.",link:"account-restricted"},r_locked:{result:true,title:"Account Locked",action:"User can self-unlock using FAQ 7. Direct them to myaccount.stevenson.edu.",link:"restricted-vs-locked-vs-disabled"},r_disabled:{result:true,title:"Account Disabled",action:"This is serious. Make a ticket with 'disabled account' in the subject line. Shows in both ADCheck and myaccount.",link:"restricted-vs-locked-vs-disabled"},r_mfa_issue:{result:true,title:"MFA Issue",action:"User may need MFA reset. Reach out to TEAM HELPDESK chat with the username. After reset, user removes old entry in Authenticator, then re-enrolls at portal.office.com.",link:"mfa-instructions"},r_no_code:{result:true,title:"Not Receiving Verification Code",action:"Confirm their external email is correct. If they need to change their external email, verify identity with student ID photo. Escalate to helpdesk manager with ID and new email.",link:"external-email-change"},r_username_lookup:{result:true,title:"Username Lookup",action:"Direct user to webxpress.stevenson.edu → 'What's My User ID?' (bottom right) → last name + SSN or Student ID → submit.",link:"username-lookup"},r_check_ad:{result:true,title:"Check AD First",action:"Before proceeding, verify the user info in ADCheck and Active Directory Users and Computers. Make sure you entered the correct ID.",link:"student-doesnt-exist"},r_auto_provision:{result:true,title:"Auto Provisioning (6+ months)",action:"Resolve the ticket. Their account will be automatically provisioned. Let them know they'll receive an email with instructions when it's ready.",link:"student-doesnt-exist"},r_manual_provision:{result:true,title:"Manual Provisioning Needed (<6 months)",action:"Change ticket type to Technology/OIT → Accounts Intake → Student Account Provisioning. Confirm with registrar that this is an active student. ⚠️ Ian Rivere reference in KB is outdated — confirm current handler.",link:"student-doesnt-exist"},r_escalate_manager:{result:true,title:"Escalate to Helpdesk Manager",action:"Existing user not showing up in AD is unusual. Escalate to the helpdesk manager for investigation."},r_bb_email_fix:{result:true,title:"Likely Fixed",action:"BB requires USERNAME only (no @stevenson.edu). Have them try again with just the username. If it still fails, check when they last changed their password.",link:"bb-cant-login"},r_bb_still_failing:{result:true,title:"Escalate to Jason",action:"Assign the ticket to Jason to check if the user is enabled in Blackboard. Include account information in the ticket notes.",link:"bb-cant-login"},r_bb_password_change:{result:true,title:"Password Change May Fix It",action:"Have the user change their password at myaccount.stevenson.edu. BB syncs with AD so a stale password can cause login failures. If it still doesn't work after the change, assign to Jason.",link:"bb-cant-login"},r_suspicious:{result:true,title:"Suspicious Activity Flag",action:"Change ticket type to Technology/OIT → Systems. Copy in all user info. Note risky sign-in. Jeremy Haas clears the flag. After: user must reset password AND MFA.",template:"We removed the risky flag on your account. You can go to https://myaccount.stevenson.edu/ and click the 'Forgot your password' button to reset your password and when you sign into https://portal.office.com it will make you enroll in MFA again. Reach back out if you have any issues.",link:"suspicious-activity"},r_mfa_reset:{result:true,title:"MFA Reset Needed",action:"Reach out to TEAM HELPDESK chat with the username for an MFA reset. After reset: user removes old Stevenson entry in Authenticator (settings cog → select → Remove Account), then goes to portal.office.com to re-enroll.",link:"mfa-instructions"},r_no_license:{result:true,title:"Missing License",action:"Assign ticket to helpdesk manager with user info and proof of status. Students get M365 A5 for students; Faculty/Staff get M365 A5 for faculty.",link:"no-license"},r_password_reset:{result:true,title:"Try Password Reset",action:"Have user go to myaccount.stevenson.edu → Forgot your password → username + captcha → verification code → new password. This fixes many sync issues.",link:"password-reset"},r_domain:{result:true,title:"Domain Not Available",action:"Device can't reach the Domain Controller. Must be plugged into ethernet. First login on a laptop always requires ethernet. Credentials cache for 60 days — after that, need ethernet again.",link:"domain-unavailable"},r_cached_creds:{result:true,title:"Cached Credentials Expired",action:"If it's a laptop, credentials may have expired (60-day cache). Plug into ethernet to re-authenticate with the domain controller, then try logging in again.",link:"domain-unavailable"}}},
  "printer-issue":{title:"Printer Issue",description:"Troubleshoot printer problems",start:"p1",nodes:{p1:{question:"What's the printer issue?",options:[{label:"Toner is low / waste toner full",next:"p_toner"},{label:"User's ID card isn't recognized",next:"p_id"},{label:"WebPrint isn't working",next:"p_webprint"},{label:"Paper jam",next:"p_jam"},{label:"Printer is offline / not responding",next:"p_offline"},{label:"User can't find their print job",next:"p_nojob"}]},p_toner:{question:"Is it a toner replacement or waste toner box?",options:[{label:"Toner cartridge needs replacing",next:"r_toner_change"},{label:"Waste toner box is full",next:"r_waste_toner"}]},p_id:{question:"Ask the user for the numbers on the back of their ID card. Do you have Papercut admin access?",options:[{label:"Yes — I can check Papercut",next:"r_id_check"},{label:"No — I need someone with Papercut access",next:"r_id_escalate"}]},p_webprint:{question:"What network is the user connected to?",options:[{label:"Eduroam or Stevenson wireless",next:"r_webprint_other"},{label:"A different network / not sure",next:"r_webprint_network"}]},r_toner_change:{result:true,title:"Change Toner",action:"MX-6071 (big): Open top cover → pull empty cartridge → replace same orientation → close. MX-3070 (small): Open main cover → swap tiny cartridge → close. Recycle old toner + box in tech office recycling.",link:"change-toner"},r_waste_toner:{result:true,title:"Waste Toner — Contact Vendor",action:"Waste toner replacements are ordered through the vendor (JBUSS typically handles this). Make a ticket with the printer ID and copier number."},r_id_check:{result:true,title:"Check Papercut Values",action:"Compare the card numbers to what's in Papercut under Card/Identity Numbers. If they don't match, the card wasn't properly associated in WinDSX. DON'T fix in Papercut (gets overwritten nightly). Security needs to update WinDSX → wait for overnight sync.",link:"printer-id"},r_id_escalate:{result:true,title:"Escalate to Papercut Admin",action:"Only Papercut admins can check the values. Get the numbers from the user's card and include them in the ticket. If there's a mismatch, security needs to update WinDSX.",link:"printer-id"},r_webprint_network:{result:true,title:"Wrong Network",action:"WebPrint (supapercut.stevenson.edu) only works on Eduroam or Stevenson wireless. Have the user switch to one of those networks and try again.",link:"webprint"},r_webprint_other:{result:true,title:"Network is Correct — Further Troubleshooting",action:"If they're on the right network and it's still not loading, check if Papercut is up. If it's a wider outage, check with the team.",link:"webprint"},p_jam:{result:true,title:"Paper Jam",action:"Try clearing the jam. If it keeps jamming in the same spot, it's likely a roller or hardware issue — contact the vendor. Change ticket to Pending Vendor."},p_offline:{result:true,title:"Printer Offline",action:"Check if the printer is powered on. Check the network cable. Try power cycling. If still offline, check with N&I for network issues in that area. Use Printer Lookup to identify the printer."},p_nojob:{result:true,title:"Missing Print Job",action:"FollowYou printers hold jobs until user taps their card. Confirm they sent to the right queue (FollowYou). If using WebPrint, must be on Eduroam or Stevenson wireless. Jobs may expire."}}},
  "new-account":{title:"New Account / Provisioning",description:"Handle new student, staff, or returning user accounts",start:"a1",nodes:{a1:{question:"Who needs the account?",options:[{label:"New student",next:"a2"},{label:"Returning student",next:"r_returning"},{label:"New hire (faculty/staff)",next:"r_new_hire"},{label:"Parent / Proxy",next:"r_parent"},{label:"Alumni wanting access",next:"a3"}]},a2:{question:"Did the student receive their setup instructions email?",options:[{label:"No — they never got it",next:"a2b"},{label:"Yes but they're having trouble",next:"r_sso_help"},{label:"They don't show up in the system at all",next:"a2c"}]},a2b:{result:true,title:"Resend Setup Instructions",action:"Use the 'Manual Account Setup Instructions' bulk action (bottom left of ticket window). No risk — won't work if account isn't active. ⚠️ Never tell users their external email or username — point to webxpress.stevenson.edu.",link:"account-setup-instructions"},a2c:{question:"When is their start date?",options:[{label:"More than 6 months away",next:"r_auto_p"},{label:"Less than 6 months away",next:"r_manual_p"},{label:"Admissions/application account issue",next:"r_admissions"}]},a3:{question:"Regular alumni or SUO alumni?",options:[{label:"Regular alumni",next:"r_alumni"},{label:"SUO alumni",next:"r_suo_alumni"}]},r_returning:{result:true,title:"Returning Student",action:"Account should auto-reprovision. May need AUP re-agreement (set expiration, send to sucloud.stevenson.edu). If fails, confirm enrollment with registrar. ⚠️ OIT can't call registrar as of 3/18/2025.",link:"returning-students"},r_new_hire:{result:true,title:"New Hire Tech Request",action:"Main ticket → PROJECT, assign to yourself. Break into: Computer/Software, Datatel/Informer, Phone, Network Drive, Etrieve. Link all to parent. Don't resolve until all complete.",link:"new-hire"},r_parent:{result:true,title:"Parent / Proxy Account",action:"Set ticket: Technology: OIT → I Can't Login → I am a Parent / Proxy. Get child's student ID, paste ADCheck. Get parent email + phone, CC on ticket. ⚠️ Ian Rivere outdated.",link:"parent-proxy"},r_alumni:{result:true,title:"Alumni — No Access",action:"Access removed ~6 months after graduation. No exceptions. Staff: reach out to previous dean. Resources: Tax Docs 443-334-3500, Transcripts 443-334-2206.",link:"alumni"},r_suo_alumni:{result:true,title:"SUO Alumni",action:"In User Lifecycle After/Alumni container. No on-prem access. 6 months M365 only. Confirm with helpdesk manager if account should be active in Entra.",link:"suo-alumni"},r_sso_help:{result:true,title:"SSO Setup Help",action:"Walk them through or send SSO template. Key: webxpress for username → myaccount → forgot password → captcha → email code → Authenticator → AUP. Use computer, not phone.",link:"sso-instructions"},r_auto_p:{result:true,title:"Auto Provision (6+ months)",action:"Resolve ticket. Auto-provisioned, they'll get an email.",link:"student-doesnt-exist"},r_manual_p:{result:true,title:"Manual Provision (<6 months)",action:"Technology/OIT → Accounts Intake → Student Account Provisioning. Confirm with registrar. ⚠️ Ian Rivere outdated.",link:"student-doesnt-exist"},r_admissions:{result:true,title:"Admissions Issue",action:"Not OIT. Direct to Admissions@stevenson.edu.",link:"student-doesnt-exist"}}},

      React.createElement("span", {className:"search-icon"}, "⌕"),
      React.createElement("input", {className:"search-box", placeholder:"Search articles, keywords, steps...", value:search, onChange:e => setSearch(e.target.value)})),

        : Object.entries(groupedArticles).map(([cat, articles]) => React.createElement("div", {key:cat},
            React.createElement("div", {className:"category-label"}, cat),
            articles.map(a => React.createElement("div", {key:a.id, className:"article-card", onClick:() => setSelectedArticle(a)},
              React.createElement("div", {className:"article-card-title"}, a.title),
              React.createElement("div", {className:"article-card-summary"}, a.summary)))))),

            React.createElement("h3", null, flow.title),

            React.createElement("tbody", null,
